// ─── Firebase Sync Module ──────────────────────────────────────────────────────
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyCht6CtwSPjedXPsk19XR26rasEK7ao7Sc",
    authDomain: "la-ctr-scheduling.firebaseapp.com",
    projectId: "la-ctr-scheduling",
    databaseURL: "https://la-ctr-scheduling-default-rtdb.firebaseio.com",
    storageBucket: "la-ctr-scheduling.firebasestorage.app",
    messagingSenderId: "491153441113",
    appId: "1:491153441113:web:8da848473c55c3de76cc48",
  };
  try {
    firebase.initializeApp(firebaseConfig);
  } catch (e) { console.warn('Firebase init issue:', e); }

  const CLIENT_ID = (() => {
    let id = localStorage.getItem('km_client_id');
    if (!id) { id = 'c_' + Math.random().toString(36).slice(2,10) + '_' + Date.now().toString(36); localStorage.setItem('km_client_id', id); }
    return id;
  })();

  const DOC_PATH = 'scheduling/v1';  // all shared state lives under this node
  const listeners = new Set();
  let status = 'connecting';  // 'connecting' | 'online' | 'offline' | 'error'
  let remoteSnapshot = null;
  let applyingRemote = false;
  let writeTimer = null;
  let lastPushedHash = null;

  const notify = () => listeners.forEach(fn => { try { fn({ status, remoteSnapshot, applyingRemote }); } catch(e){} });

  const setStatus = s => { if (s !== status) { status = s; notify(); } };

  const hash = obj => {
    try { const s = JSON.stringify(obj); let h=5381; for (let i=0;i<s.length;i++) h=((h<<5)+h)+s.charCodeAt(i); return h; } catch(e) { return Math.random(); }
  };

  // Auth: anonymous sign-in → then subscribe to the shared doc
  firebase.auth().onAuthStateChanged(user => {
    if (user) {
      const ref = firebase.database().ref(DOC_PATH);
      ref.on('value', snap => {
        const val = snap.val();
        if (!val) { setStatus('online'); return; }
        // Ignore our own writes (sender matches)
        if (val._meta && val._meta.sender === CLIENT_ID && val._meta.hash === lastPushedHash) {
          setStatus('online');
          return;
        }
        remoteSnapshot = val;
        applyingRemote = true;
        notify();
        applyingRemote = false;
        setStatus('online');
      }, err => {
        console.error('Firebase read error:', err);
        setStatus('error');
      });
      // Connection status
      firebase.database().ref('.info/connected').on('value', s => {
        setStatus(s.val() ? 'online' : 'offline');
      });
    }
  });

  firebase.auth().signInAnonymously().catch(e => {
    console.error('Firebase anon auth failed:', e);
    setStatus('error');
  });

  window.KMSync = {
    CLIENT_ID,
    subscribe(fn) { listeners.add(fn); fn({ status, remoteSnapshot, applyingRemote }); return () => listeners.delete(fn); },
    push(state) {
      // Debounce — coalesce rapid edits into one write
      clearTimeout(writeTimer);
      writeTimer = setTimeout(() => {
        const h = hash(state);
        lastPushedHash = h;
        const payload = { ...state, _meta: { sender: CLIENT_ID, ts: Date.now(), hash: h } };
        firebase.database().ref(DOC_PATH).set(payload).catch(e => {
          console.error('Firebase write error:', e);
          setStatus('error');
        });
      }, 600);
    },
    get status() { return status; },
    async pushImmediate(state) {
      clearTimeout(writeTimer);
      const h = hash(state); lastPushedHash = h;
      const payload = { ...state, _meta: { sender: CLIENT_ID, ts: Date.now(), hash: h } };
      return firebase.database().ref(DOC_PATH).set(payload);
    },
  };
})();
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1C1E26;color:#E8EAF0;height:100vh;overflow:hidden;display:flex;flex-direction:column;}
/* Shell */
.app-header{background:#13151C;border-bottom:1px solid #2A2D3A;display:flex;align-items:center;height:52px;flex-shrink:0;padding:0 16px;gap:16px;}
.app-logo{font-weight:800;font-size:15px;letter-spacing:.04em;color:#fff;white-space:nowrap;}
.app-logo span{color:#E8890C;}
.main-tabs{display:flex;gap:2px;}
.main-tab{padding:6px 14px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:transparent;color:#8B8FA8;transition:all .15s;}
.main-tab.active{background:#2A2D3A;color:#fff;}
.main-tab:hover:not(.active){color:#C8CAD6;}
.week-nav{display:flex;align-items:center;gap:8px;margin-left:auto;}
.week-label{font-size:13px;font-weight:700;color:#fff;min-width:170px;text-align:center;}
.nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid #2A2D3A;background:#1C1E26;color:#8B8FA8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s;}
.nav-btn:hover{background:#2A2D3A;color:#fff;}
.labor-toggle{margin-left:12px;padding:6px 12px;border-radius:6px;border:1px solid #2A2D3A;background:transparent;color:#8B8FA8;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;}
.labor-toggle.active{background:#E8890C22;border-color:#E8890C;color:#E8890C;}
/* Body layout */
.app-body{display:flex;flex:1;overflow:hidden;}
/* Week summary bar */
.week-summary{height:36px;background:#13151C;border-bottom:1px solid #2A2D3A;display:flex;align-items:center;padding:0 14px;gap:20px;flex-shrink:0;overflow-x:auto;}
.ws-item{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.ws-label{font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.05em;}
.ws-val{font-size:12px;font-weight:800;color:#E8EAF0;}
.ws-divider{width:1px;height:20px;background:#2A2D3A;flex-shrink:0;}
/* Dept sidebar */
.dept-sidebar{width:155px;flex-shrink:0;background:#13151C;border-right:1px solid #2A2D3A;display:flex;flex-direction:column;padding:10px 8px;gap:3px;overflow-y:auto;}
.dept-btn{padding:7px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;text-align:left;display:flex;align-items:center;gap:8px;transition:all .15s;width:100%;}
.dept-btn .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.dept-btn .dept-name{font-size:11px;font-weight:600;line-height:1.2;}
.dept-btn.active{background:#2A2D3A;}
.dept-btn:hover:not(.active){background:#1F2130;}
.dept-all-btn{padding:7px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;text-align:left;font-size:11px;font-weight:700;color:#8B8FA8;width:100%;margin-bottom:3px;transition:all .15s;}
.dept-all-btn.active{background:#2A2D3A;color:#fff;}
.dept-all-btn:hover:not(.active){background:#1F2130;color:#C8CAD6;}
.dept-section-label{font-size:10px;font-weight:700;color:#4A4D60;letter-spacing:.08em;text-transform:uppercase;padding:6px 10px 3px;}
/* Schedule grid */
.schedule-area{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.grid-wrapper{flex:1;overflow:auto;}
.schedule-table{border-collapse:collapse;width:100%;min-width:900px;}
.schedule-table thead th{position:sticky;top:0;z-index:10;background:#13151C;border-bottom:2px solid #2A2D3A;padding:0;white-space:nowrap;}
.th-name{width:175px;min-width:175px;padding:10px 14px;text-align:left;font-size:10px;font-weight:700;color:#4A4D60;letter-spacing:.06em;text-transform:uppercase;border-right:1px solid #2A2D3A;}
.th-day{min-width:100px;padding:6px 8px;text-align:center;}
.th-day-name{font-size:11px;font-weight:800;color:#E8EAF0;letter-spacing:.04em;}
.th-day-date{font-size:10px;color:#6B6F85;margin-top:1px;}
.th-day-event{font-size:9px;color:#4A4D60;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;}
.th-total{width:56px;padding:10px 6px;text-align:center;font-size:10px;font-weight:700;color:#4A4D60;letter-spacing:.06em;border-left:1px solid #2A2D3A;}
.section-row td{padding:7px 14px;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;border-top:2px solid #2A2D3A;border-bottom:1px solid #2A2D3A;}
.section-label{display:flex;align-items:center;gap:8px;}
.section-count{font-size:10px;font-weight:600;opacity:.5;margin-left:4px;}
.emp-row{border-bottom:1px solid #22253240;}
.emp-row:hover{background:#1F2130;}
.td-name{padding:5px 14px;border-right:1px solid #22253240;white-space:nowrap;position:sticky;left:0;background:#1C1E26;z-index:5;}
.emp-row:hover .td-name{background:#1F2130;}
.emp-name{font-size:12px;font-weight:600;color:#C8CAD6;}
.emp-role{font-size:10px;color:#6B6F85;margin-top:1px;}
.td-cell{padding:2px 3px;text-align:center;}
.cell-inner{border-radius:6px;padding:3px 5px;cursor:pointer;transition:background .1s;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
.cell-inner:hover{background:#2A2D3A;}
.cell-badge{font-size:10px;font-weight:800;padding:1px 5px;border-radius:4px;letter-spacing:.03em;}
.cell-time{font-size:9px;color:#8B8FA8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:88px;}
.cell-hours{font-size:9px;font-weight:700;color:#6B6F85;}
.cell-off{color:#3A3D50;font-size:10px;font-weight:600;}
.td-total{border-left:1px solid #22253240;padding:5px 6px;text-align:center;font-size:13px;font-weight:800;}
/* Edit popup */
.cell-edit-overlay{position:fixed;inset:0;z-index:100;}
.cell-edit-popup{position:fixed;z-index:101;background:#252838;border:1px solid #3A3D50;border-radius:10px;padding:14px;width:220px;box-shadow:0 8px 32px #00000070;}
.popup-title{font-size:11px;font-weight:700;color:#6B6F85;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.popup-presets{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;}
.preset-btn{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid #3A3D50;background:#1C1E26;color:#C8CAD6;transition:all .1s;}
.preset-btn:hover,.preset-btn.sel{border-color:#E8890C;color:#E8890C;background:#E8890C11;}
.popup-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.popup-label{font-size:10px;font-weight:600;color:#6B6F85;}
.popup-input{background:#1C1E26;border:1px solid #3A3D50;border-radius:6px;color:#E8EAF0;font-size:13px;padding:6px 10px;width:100%;outline:none;}
.popup-input:focus{border-color:#E8890C;}
.popup-actions{display:flex;gap:6px;}
.popup-save{flex:1;padding:7px;border-radius:6px;border:none;background:#E8890C;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
.popup-save:hover{background:#F09830;}
.popup-cancel{padding:7px 10px;border-radius:6px;border:1px solid #3A3D50;background:transparent;color:#8B8FA8;font-size:12px;font-weight:700;cursor:pointer;}
/* Labor panel */
.labor-panel{width:300px;flex-shrink:0;background:#13151C;border-left:1px solid #2A2D3A;display:flex;flex-direction:column;overflow:hidden;}
.lp-header{padding:12px 14px 8px;border-bottom:1px solid #2A2D3A;flex-shrink:0;}
.lp-title{font-size:13px;font-weight:800;color:#fff;}
.lp-subtitle{font-size:10px;color:#6B6F85;margin-top:2px;}
.lp-body{flex:1;overflow-y:auto;padding:10px;}
.lp-dept-row{padding:9px 11px;border-radius:8px;background:#1C1E26;margin-bottom:5px;border:1px solid #22253270;}
.lp-dept-header{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.lp-dept-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lp-dept-name{font-size:11px;font-weight:700;flex:1;}
.lp-dept-hrs{font-size:10px;color:#6B6F85;}
.lp-bar-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
.lp-bar-label{font-size:9px;font-weight:700;color:#4A4D60;width:44px;text-transform:uppercase;letter-spacing:.04em;}
.lp-bar-track{flex:1;height:5px;background:#2A2D3A;border-radius:3px;overflow:hidden;}
.lp-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.lp-bar-val{font-size:10px;font-weight:700;min-width:54px;text-align:right;}
.lp-balance{margin-top:7px;padding:5px 8px;border-radius:6px;background:#252838;display:flex;justify-content:space-between;align-items:center;}
.lp-balance-label{font-size:9px;color:#6B6F85;font-weight:600;}
.lp-balance-val{font-size:12px;font-weight:800;}
.pos{color:#16A34A;}.neg{color:#DC2626;}
/* ── Daily Labor Tab ──────────────────────────────────────────────────── */
.dl-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.dl-header{background:#13151C;border-bottom:1px solid #2A2D3A;padding:12px 18px;flex-shrink:0;display:flex;align-items:center;gap:20px;}
.dl-header-title{font-size:14px;font-weight:800;color:#fff;}
.dl-stat{display:flex;flex-direction:column;}
.dl-stat-label{font-size:9px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;}
.dl-stat-val{font-size:13px;font-weight:800;color:#E8EAF0;}
.dl-body{flex:1;overflow:auto;padding:16px;}
/* Events bar */
.events-bar{display:flex;gap:0;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid #2A2D3A;}
.event-day{flex:1;padding:8px 10px;background:#1C1E26;border-right:1px solid #2A2D3A;min-width:0;}
.event-day:last-child{border-right:none;}
.event-day-label{font-size:10px;font-weight:800;color:#E8EAF0;letter-spacing:.04em;}
.event-day-date{font-size:9px;color:#6B6F85;margin-top:1px;}
.event-day-name{font-size:10px;color:#8B8FA8;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Daily grid */
.dl-table{width:100%;border-collapse:collapse;min-width:900px;}
.dl-table th{position:sticky;top:0;z-index:5;background:#13151C;padding:8px 10px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;text-align:center;border-bottom:2px solid #2A2D3A;white-space:nowrap;}
.dl-table th.dept-col{text-align:left;min-width:120px;}
.dl-table th.total-col{border-left:2px solid #2A2D3A;}
.dl-td{padding:0;border-bottom:1px solid #22253240;vertical-align:top;}
.dl-dept-cell{padding:10px 12px;border-right:2px solid #2A2D3A;}
.dl-dept-name{font-size:12px;font-weight:700;}
.dl-dept-role{font-size:10px;color:#6B6F85;margin-top:2px;}
.dl-day-cell{padding:6px 8px;text-align:center;border-right:1px solid #22253240;}
.dl-day-cell:last-child{border-right:none;}
.dl-metric{display:flex;flex-direction:column;gap:2px;min-width:80px;}
.dl-metric-row{display:flex;justify-content:space-between;align-items:center;padding:1px 3px;border-radius:3px;}
.dl-metric-lbl{font-size:9px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.04em;width:28px;}
.dl-metric-val{font-size:10px;font-weight:700;}
.dl-var-pos{color:#16A34A;}.dl-var-neg{color:#DC2626;}.dl-var-none{color:#4A4D60;}
.dl-total-cell{padding:6px 10px;border-left:2px solid #2A2D3A;text-align:right;}
.dl-total-hrs{font-size:13px;font-weight:800;color:#E8EAF0;}
.dl-total-fcst{font-size:10px;color:#8B8FA8;margin-top:2px;}
.dl-total-act{font-size:10px;font-weight:700;margin-top:1px;}
/* Declining balance cards */
.dl-balance-section{margin-top:18px;}
.dl-balance-title{font-size:11px;font-weight:800;color:#4A4D60;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;}
.dl-balance-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px;}
.dl-balance-card{background:#1C1E26;border:1px solid #2A2D3A;border-radius:10px;padding:12px 14px;}
.dl-bc-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.dl-bc-dot{width:10px;height:10px;border-radius:50%;}
.dl-bc-name{font-size:12px;font-weight:700;flex:1;}
.dl-bc-budget{font-size:11px;color:#6B6F85;}
.dl-bc-bars{display:flex;flex-direction:column;gap:4px;}
.dl-bc-bar-row{display:flex;align-items:center;gap:8px;}
.dl-bc-label{font-size:9px;font-weight:700;color:#4A4D60;text-transform:uppercase;width:48px;}
.dl-bc-track{flex:1;height:7px;background:#2A2D3A;border-radius:4px;overflow:hidden;}
.dl-bc-fill{height:100%;border-radius:4px;transition:width .4s;}
.dl-bc-value{font-size:11px;font-weight:700;min-width:64px;text-align:right;}
.dl-bc-remaining{margin-top:8px;padding:6px 9px;border-radius:6px;background:#252838;display:flex;justify-content:space-between;align-items:center;}
.dl-bc-rem-label{font-size:9px;font-weight:700;color:#6B6F85;text-transform:uppercase;letter-spacing:.04em;}
.dl-bc-rem-val{font-size:14px;font-weight:900;}
/* ── Import Tab ───────────────────────────────────────────────────────── */
.import-view{flex:1;overflow:auto;padding:20px;}
.import-layout{display:grid;grid-template-columns:1fr 1.4fr;gap:20px;max-width:1200px;}
.import-card{background:#1C1E26;border:1px solid #2A2D3A;border-radius:12px;padding:18px;}
.import-card-title{font-size:13px;font-weight:800;color:#fff;margin-bottom:6px;}
.import-card-sub{font-size:12px;color:#6B6F85;margin-bottom:14px;line-height:1.6;}
.import-steps{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.import-step{display:flex;gap:10px;align-items:flex-start;}
.step-num{width:22px;height:22px;border-radius:50%;background:#E8890C22;border:1px solid #E8890C44;color:#E8890C;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-text{font-size:12px;color:#8B8FA8;line-height:1.5;}
.step-text strong{color:#C8CAD6;}
.cc-map{font-size:11px;color:#8B8FA8;line-height:1.8;background:#252838;border-radius:8px;padding:10px 12px;}
.cc-map span{font-weight:700;color:#C8CAD6;margin-right:6px;}
.import-textarea{width:100%;background:#13151C;border:1px solid #3A3D50;border-radius:8px;color:#C8CAD6;font-size:12px;font-family:monospace;padding:12px;outline:none;resize:vertical;min-height:160px;line-height:1.4;}
.import-textarea:focus{border-color:#E8890C;}
.import-actions{display:flex;gap:8px;margin-top:10px;}
.import-btn{padding:8px 18px;border-radius:7px;border:none;background:#E8890C;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.import-btn:hover{background:#F09830;}
.import-btn-sec{padding:8px 18px;border-radius:7px;border:1px solid #3A3D50;background:transparent;color:#8B8FA8;font-size:13px;font-weight:600;cursor:pointer;}
.import-btn-sec:hover{border-color:#6B6F85;color:#C8CAD6;}
.import-preview{margin-top:16px;}
.import-preview-title{font-size:11px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.preview-table{width:100%;border-collapse:collapse;}
.preview-table th{padding:6px 10px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #2A2D3A;text-align:left;}
.preview-table td{padding:7px 10px;font-size:12px;border-bottom:1px solid #22253240;}
.preview-table tr:hover td{background:#1F2130;}
.import-success{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;background:#16A34A22;border:1px solid #16A34A44;color:#4ADE80;font-size:12px;font-weight:600;margin-top:12px;}
.import-error{background:#DC262622;border-color:#DC262644;color:#F87171;}
/* People view */
.people-view{flex:1;overflow:auto;padding:20px;}
.people-table{width:100%;border-collapse:collapse;}
.people-table th{text-align:left;padding:7px 12px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #2A2D3A;background:#13151C;position:sticky;top:0;z-index:5;}
.people-table td{padding:7px 12px;border-bottom:1px solid #22253240;font-size:12px;vertical-align:middle;}
.people-table tr:hover td{background:#1F2130;}
.dept-select{background:#1C1E26;border:1px solid #3A3D50;border-radius:6px;color:#E8EAF0;font-size:11px;padding:3px 7px;cursor:pointer;outline:none;}
.dept-select:focus{border-color:#E8890C;}
.role-input{background:transparent;border:1px solid transparent;border-radius:6px;color:#C8CAD6;font-size:12px;padding:3px 7px;width:130px;outline:none;}
.role-input:focus{border-color:#3A3D50;background:#13151C;}
.add-emp-row{display:flex;gap:8px;padding:14px 0 0;}
.add-inp{background:#1C1E26;border:1px solid #3A3D50;border-radius:6px;color:#E8EAF0;font-size:12px;padding:7px 10px;outline:none;flex:1;}
.add-inp:focus{border-color:#E8890C;}
.add-btn{padding:7px 16px;border-radius:6px;border:none;background:#E8890C;color:#fff;font-size:12px;font-weight:700;cursor:pointer;}
/* ── Declining Balance Tab ────────────────────────────────────────────── */
.db-view{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.db-header{background:#13151C;border-bottom:1px solid #2A2D3A;padding:14px 18px;flex-shrink:0;}
.db-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:10px;}
.db-summary{display:flex;gap:24px;align-items:flex-end;flex-wrap:wrap;}
.db-big{display:flex;flex-direction:column;}
.db-big-label{font-size:9px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.08em;}
.db-big-val{font-size:22px;font-weight:900;line-height:1;}
.db-progress-bar{height:6px;background:#2A2D3A;border-radius:4px;overflow:hidden;margin-top:6px;width:200px;}
.db-progress-fill{height:100%;border-radius:4px;transition:width .4s;}
.db-dept-select{background:#1C1E26;border:1px solid #3A3D50;border-radius:7px;color:#E8EAF0;font-size:12px;font-weight:600;padding:7px 12px;outline:none;cursor:pointer;margin-left:auto;}
.db-dept-select:focus{border-color:#E8890C;}
.db-body{flex:1;overflow:auto;padding:16px;}
.db-table{width:100%;border-collapse:collapse;min-width:700px;}
.db-table th{position:sticky;top:0;z-index:5;background:#13151C;padding:7px 12px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;text-align:left;border-bottom:2px solid #2A2D3A;white-space:nowrap;}
.db-table th.num{text-align:right;}
.db-row{border-bottom:1px solid #22253240;}
.db-row:hover{background:#1F2130;}
.db-row.future{opacity:.45;}
.db-row.week-row{background:#E8890C08;}
.db-row.has-actual-good{background:#16A34A08;}
.db-row.has-actual-bad{background:#DC262608;}
.db-td{padding:7px 12px;font-size:12px;vertical-align:middle;}
.db-td.num{text-align:right;font-variant-numeric:tabular-nums;}
.db-td.date{font-weight:700;color:#C8CAD6;white-space:nowrap;}
.db-td.dow{color:#6B6F85;font-size:11px;width:36px;}
.db-td.event{color:#8B8FA8;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.db-td.balance{font-weight:800;font-size:13px;}
.db-var-pos{color:#4ADE80;}.db-var-neg{color:#F87171;}.db-var-zero{color:#4A4D60;}
.db-balance-bar{width:80px;height:4px;background:#2A2D3A;border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-left:8px;}
.db-balance-fill{height:100%;border-radius:2px;}
/* ── Statistics Tab ───────────────────────────────────────────────────── */
.stats-view{flex:1;overflow:auto;padding:18px;}
.stats-section{margin-bottom:22px;}
.stats-section-title{font-size:10px;font-weight:800;color:#4A4D60;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;}
.kpi-card{background:#1C1E26;border:1px solid #2A2D3A;border-radius:10px;padding:14px 16px;}
.kpi-label{font-size:9px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.kpi-val{font-size:22px;font-weight:900;line-height:1;}
.kpi-sub{font-size:10px;color:#6B6F85;margin-top:4px;}
.kpi-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-top:6px;}
.badge-green{background:#16A34A22;color:#4ADE80;}
.badge-red{background:#DC262622;color:#F87171;}
.badge-amber{background:#E8890C22;color:#E8890C;}
/* Dept perf table */
.perf-table{width:100%;border-collapse:collapse;}
.perf-table th{padding:7px 12px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid #2A2D3A;text-align:left;white-space:nowrap;}
.perf-table th.r{text-align:right;}
.perf-table td{padding:8px 12px;border-bottom:1px solid #22253240;font-size:12px;vertical-align:middle;}
.perf-table tr:hover td{background:#1F2130;}
.util-bar{width:100%;height:6px;background:#2A2D3A;border-radius:3px;overflow:hidden;margin-top:4px;}
.util-fill{height:100%;border-radius:3px;transition:width .4s;}
/* Day distribution */
.day-dist{display:grid;grid-template-columns:40px 1fr 64px;gap:4px;align-items:center;}
.day-dist-label{font-size:11px;font-weight:700;color:#8B8FA8;}
.day-dist-track{height:24px;background:#2A2D3A;border-radius:4px;overflow:hidden;}
.day-dist-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;}
.day-dist-val{font-size:11px;font-weight:700;color:#E8EAF0;text-align:right;}
.stats-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.stats-card{background:#1C1E26;border:1px solid #2A2D3A;border-radius:10px;padding:14px 16px;}
.stats-card-title{font-size:11px;font-weight:800;color:#C8CAD6;margin-bottom:12px;}
.insight-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #22253240;}
.insight-row:last-child{border-bottom:none;}
.insight-icon{font-size:16px;flex-shrink:0;}
.insight-text{font-size:12px;color:#8B8FA8;flex:1;line-height:1.4;}
.insight-text strong{color:#C8CAD6;}
/* Print button */
.print-btn{padding:5px 12px;border-radius:6px;border:1px solid #2A2D3A;background:transparent;color:#8B8FA8;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s;}
.print-btn:hover{background:#2A2D3A;color:#fff;}
/* ── Budget Tab ────────────────────────────────────────────────────────── */
.bg-view{flex:1;overflow:auto;padding:18px;}
.bg-section{margin-bottom:22px;background:#1C1E26;border:1px solid #2A2D3A;border-radius:12px;padding:16px 18px;}
.bg-title{font-size:12px;font-weight:800;color:#fff;margin-bottom:4px;}
.bg-sub{font-size:11px;color:#6B6F85;margin-bottom:14px;line-height:1.5;}
.bg-grid-2{display:grid;grid-template-columns:1.2fr 1fr;gap:16px;}
.sales-table{width:100%;border-collapse:collapse;}
.sales-table th{padding:7px 10px;font-size:10px;font-weight:700;color:#4A4D60;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid #2A2D3A;text-align:right;white-space:nowrap;}
.sales-table th:first-child,.sales-table th:nth-child(2){text-align:left;}
.sales-table td{padding:5px 10px;border-bottom:1px solid #22253240;font-size:12px;}
.sales-table td.num{text-align:right;font-variant-numeric:tabular-nums;}
.sales-table tr.tot-row td{border-top:2px solid #3A3D50;font-weight:800;background:#13151C;font-size:13px;padding:8px 10px;}

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:.55;transform:scale(.88);} }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect, useMemo } = React;
const { DEPTS, COST_CENTER_MAP, mapCostCenter, DAYS, WEEK_DATES, WEEK_EVENTS,
        WEEK_START_SERIAL, AVG_RATES, STATUS_COLORS, INIT_EMPLOYEES, LABOR_DATA,
        DEPT_GROUPS, DEFAULT_BUDGET_CONFIG, MARCH_DAYS } = window;

const getDept = id => DEPTS.find(d=>d.id===id)||DEPTS[0];
const fmt$ = n => n===0?'—':'$'+Math.round(n).toLocaleString();
const fmtH = n => n===0?'—':n+'h';

// ── Week context — consumers re-render when active week changes ──
const WeekContext = React.createContext(null);
const useWeek = () => {
  const ctx = React.useContext(WeekContext);
  return ctx || { dates: window.WEEK_DATES, events: window.WEEK_EVENTS };
};

// ── Rate helpers ──────────────────────────────────────────────────────────
// Shift tuple is [status, hours, time] with optional [flag, rateOverride].
// flag values: '' | 'OT' (1.5x) | 'HOL' (2x)
const getShiftFlag = sh => sh[3]||'';
const getShiftRateOverride = sh => (sh[4]==null||sh[4]==='')?null:parseFloat(sh[4]);
const getEmpRate = emp => emp.rate!=null ? parseFloat(emp.rate) : (AVG_RATES[emp.dept]||30);
const getShiftCost = (emp, sh) => {
  const hrs = sh[1]||0; if(!hrs) return 0;
  const base = getShiftRateOverride(sh) ?? getEmpRate(emp);
  const mult = sh[3]==='OT' ? 1.5 : sh[3]==='HOL' ? 2.0 : 1.0;
  return hrs * base * mult;
};
const getEmpWeeklyCost = emp => emp.shifts.reduce((s,sh)=>s+getShiftCost(emp,sh),0);
// Shift dept override: sh[5] = dept id string, or null = use emp's primary dept
const getShiftDept = (emp, sh) => sh[5] || emp.dept;
const getShiftDeptOv = sh => sh[5] || null;

// ─── CellPopup ────────────────────────────────────────────────────────────────
function CellPopup({ emp, dayIdx, onSave, onClose }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const shift = emp.shifts[dayIdx];
  const [status, setStatus] = useState(shift[0]);
  const [hours, setHours]   = useState(shift[1]||'');
  const [time, setTime]     = useState(shift[2]||'');
  const [flag, setFlag]     = useState(shift[3]||'');
  const [rateOv, setRateOv] = useState(shift[4]==null?'':shift[4]);
  const [deptOv, setDeptOv] = useState(shift[5]||'');
  const presets = ['C','P','B','R','S','LD','CA','BA','STW','H','OFF','CANCEL','PASS','AVAIL'];
  const baseRate = getEmpRate(emp);
  const effRate = (rateOv!==''?parseFloat(rateOv):baseRate) * (flag==='OT'?1.5:flag==='HOL'?2.0:1.0);
  const cost = (parseFloat(hours)||0) * effRate;
  const save = () => {
    const tuple = [status, parseFloat(hours)||0, time];
    const hasAny = flag || rateOv!=='' || deptOv;
    if (hasAny) {
      tuple[3] = flag || '';
      tuple[4] = rateOv===''?null:parseFloat(rateOv);
      tuple[5] = deptOv || null;
    }
    onSave(emp.id, dayIdx, tuple); onClose();
  };
  return (
    <>
      <div className="cell-edit-overlay" onClick={onClose}/>
      <div className="cell-edit-popup" style={{top:130,left:'50%',transform:'translateX(-50%)'}}>
        <div className="popup-title">{emp.name} — {DAYS[dayIdx]} {WEEK_DATES[dayIdx][0]}</div>
        <div className="popup-presets">
          {presets.map(p=><button key={p} className={`preset-btn${status===p?' sel':''}`} onClick={()=>setStatus(p)}>{p}</button>)}
        </div>
        <div className="popup-row">
          <label className="popup-label">Hours</label>
          <input className="popup-input" type="number" min="0" max="24" step=".5" value={hours} onChange={e=>setHours(e.target.value)} placeholder="0"/>
        </div>
        <div className="popup-row">
          <label className="popup-label">Shift Time</label>
          <input className="popup-input" type="text" value={time} onChange={e=>setTime(e.target.value)} placeholder="e.g. 4A–12P"/>
        </div>
        <div style={{borderTop:'1px solid #2A2D3A',margin:'4px 0',paddingTop:8}}>
          <div style={{fontSize:10,fontWeight:700,color:'#6B6F85',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Rate Flags</div>
          <div className="popup-presets" style={{marginBottom:8}}>
            {[['','Regular'],['OT','Overtime (1.5×)'],['HOL','Holiday (2×)']].map(([val,lbl])=>(
              <button key={val} className={`preset-btn${flag===val?' sel':''}`} style={flag===val&&val==='OT'?{background:'#E8890C33',color:'#E8890C',borderColor:'#E8890C'}:flag===val&&val==='HOL'?{background:'#DC262633',color:'#F87171',borderColor:'#DC2626'}:{}} onClick={()=>setFlag(val)}>{lbl}</button>
            ))}
          </div>
          <div className="popup-row">
            <label className="popup-label">Rate Override</label>
            <input className="popup-input" type="number" min="0" step=".25" value={rateOv} onChange={e=>setRateOv(e.target.value)} placeholder={`Default: $${baseRate.toFixed(2)}/hr`}/>
          </div>
          <div className="popup-row">
            <label className="popup-label">Work Dept</label>
            <select className="popup-input" value={deptOv} onChange={e=>setDeptOv(e.target.value)} style={{cursor:'pointer'}}>
              <option value="">Primary: {getDept(emp.dept).label}</option>
              {DEPTS.filter(d=>d.id!==emp.dept).map(d=><option key={d.id} value={d.id}>→ {d.label}</option>)}
            </select>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',padding:'4px 2px',fontSize:11,color:'#6B6F85'}}>
            <span>Effective rate: <strong style={{color:flag==='OT'?'#E8890C':flag==='HOL'?'#F87171':'#E8EAF0'}}>${effRate.toFixed(2)}/hr</strong></span>
            <span>Cost: <strong style={{color:'#E8EAF0'}}>{cost>0?fmt$(cost):'—'}</strong></span>
          </div>
        </div>
        <div className="popup-actions">
          <button className="popup-cancel" onClick={onClose}>Cancel</button>
          <button className="popup-save" onClick={save}>Save</button>
        </div>
      </div>
    </>
  );
}

// ─── LaborPanel ───────────────────────────────────────────────────────────────
function LaborPanel({ employees, laborData, actuals }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const actualHrsByDept = useMemo(()=>{
    const m={};
    employees.forEach(e=>{ const h=e.shifts.reduce((s,sh)=>s+(sh[1]||0),0); m[e.dept]=(m[e.dept]||0)+h; });
    return m;
  },[employees]);
  return (
    <div className="labor-panel">
      <div className="lp-header"><div className="lp-title">Labor Budget — March 2026</div><div className="lp-subtitle">Forecast vs. Actual by Department</div></div>
      <div className="lp-body">
        {laborData.map(ld=>{
          const dept=getDept(ld.dept); const aHrs=actualHrsByDept[ld.dept]||0;
          const rate=AVG_RATES[ld.dept]||30; const fcstWk=aHrs*rate;
          const actAmt=actuals?.[ld.dept]?.total||0;
          const base=Math.max(ld.budget,ld.forecast,actAmt,1);
          const balance=ld.budget?(ld.budget-actAmt):(ld.forecast-actAmt);
          return (
            <div className="lp-dept-row" key={ld.dept}>
              <div className="lp-dept-header">
                <div className="lp-dept-dot" style={{background:dept.color}}/>
                <span className="lp-dept-name" style={{color:dept.color}}>{dept.label}</span>
                <span className="lp-dept-hrs">{aHrs}h</span>
              </div>
              {ld.budget>0 && <div className="lp-bar-row">
                <span className="lp-bar-label">Budget</span>
                <div className="lp-bar-track"><div className="lp-bar-fill" style={{width:`${Math.min(100,ld.budget/base*100)}%`,background:'#4A4D60'}}/></div>
                <span className="lp-bar-val" style={{color:'#6B6F85'}}>{fmt$(ld.budget)}</span>
              </div>}
              <div className="lp-bar-row">
                <span className="lp-bar-label">Forecast</span>
                <div className="lp-bar-track"><div className="lp-bar-fill" style={{width:`${Math.min(100,ld.forecast/base*100)}%`,background:dept.color+'99'}}/></div>
                <span className="lp-bar-val" style={{color:dept.color}}>{fmt$(ld.forecast)}</span>
              </div>
              <div className="lp-bar-row">
                <span className="lp-bar-label">Actual</span>
                <div className="lp-bar-track"><div className="lp-bar-fill" style={{width:`${Math.min(100,actAmt/base*100)}%`,background:dept.color}}/></div>
                <span className="lp-bar-val" style={{color:'#E8EAF0'}}>{actAmt>0?fmt$(actAmt):'—'}</span>
              </div>
              <div className="lp-balance">
                <span className="lp-balance-label">{ld.budget?'Remaining Budget':'vs Forecast'}</span>
                <span className={`lp-balance-val ${balance>=0?'pos':'neg'}`}>{balance>=0?'+':''}{fmt$(Math.abs(balance))}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ScheduleGrid ─────────────────────────────────────────────────────────────
function ScheduleGrid({ employees, activeDept, onCellEdit }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const [editing, setEditing] = useState(null);
  const groups = useMemo(()=>{
    const vis = activeDept==='all'?employees:employees.filter(e=>e.dept===activeDept || e.shifts.some(sh=>sh[5]===activeDept));
    // Group employees under a dept when they have either primary dept match OR any override shift to that dept
    const m={}; DEPTS.forEach(d=>{m[d.id]=[];});
    vis.forEach(e=>{
      const depts = new Set([e.dept]);
      e.shifts.forEach(sh=>{ if(sh[5]) depts.add(sh[5]); });
      depts.forEach(d=>{ if(m[d]) m[d].push(e); });
    });
    return DEPTS.map(d=>({dept:d,emps:m[d.id]})).filter(g=>g.emps.length>0);
  },[employees,activeDept]);
  const todayCol = (new Date().getDay()+6)%7; // Mon=0
  return (
    <div className="grid-wrapper">
      {editing && <CellPopup emp={employees.find(e=>e.id===editing.empId)} dayIdx={editing.dayIdx} onSave={onCellEdit} onClose={()=>setEditing(null)}/>}
      <table className="schedule-table">
        <thead><tr>
          <th className="th-name">Employee</th>
          {DAYS.map((d,i)=>(
            <th key={d} className="th-day" style={i===todayCol?{background:'#E8890C18'}:{}}>
              <div className="th-day-name">{d}</div>
              <div className="th-day-date">{WEEK_DATES[i][0]}</div>
              <div className="th-day-event">{WEEK_EVENTS[i]?.event}</div>
            </th>
          ))}
          <th className="th-total">HRS</th>
        </tr></thead>
        <tbody>
          {groups.map(({dept,emps})=>(
            <React.Fragment key={dept.id}>
              <tr className="section-row" style={{background:dept.light}}>
                <td colSpan={9} style={{color:dept.color}}>
                  <div className="section-label">
                    <span style={{width:9,height:9,borderRadius:'50%',background:dept.color,display:'inline-block'}}/>
                    {dept.label}<span className="section-count">{emps.length} staff</span>
                  </div>
                </td>
              </tr>
              {emps.map(emp=>{
                // For this dept-section row: show only shifts assigned to this dept (primary with no override, or overridden to this dept)
                const sectionShifts = emp.shifts.map(sh => {
                  const shDept = sh[5] || emp.dept;
                  return shDept === dept.id ? sh : ['',0,''];
                });
                const total=sectionShifts.reduce((s,sh)=>s+(sh[1]||0),0);
                const isCrossover = emp.dept !== dept.id;
                return (
                  <tr key={emp.id+'@'+dept.id} className="emp-row">
                    <td className="td-name">
                      <div className="emp-name">{emp.name}{isCrossover&&<span style={{marginLeft:6,fontSize:8,fontWeight:800,color:getDept(emp.dept).color,background:getDept(emp.dept).color+'22',padding:'1px 5px',borderRadius:3,letterSpacing:'.04em',verticalAlign:'middle'}}>FROM {getDept(emp.dept).label.toUpperCase()}</span>}</div>
                      <div className="emp-role">{emp.role}</div>
                    </td>
                    {sectionShifts.map((sh,di)=>{
                      const [st,hrs,tm]=sh; const flag=sh[3]||''; const origSh=emp.shifts[di]; const shDept = origSh[5] || emp.dept;
                      const sc=STATUS_COLORS[st]||STATUS_COLORS[''];
                      const showDeptBadge = origSh[5] && origSh[5]===dept.id && origSh[1]>0;
                      return (
                        <td key={di} className="td-cell" style={di===todayCol?{background:'#E8890C08'}:{}}>
                          <div className="cell-inner" onClick={()=>setEditing({empId:emp.id,dayIdx:di})}>
                            {(!st||st==='')?<span className="cell-off">—</span>:
                             st==='OFF'?<span className="cell-off">OFF</span>:(
                              <><span className="cell-badge" style={{background:sc.bg,color:sc.color}}>{st}{flag==='OT'&&<span style={{fontSize:7,marginLeft:3,color:'#E8890C',fontWeight:900}}>OT</span>}{flag==='HOL'&&<span style={{fontSize:7,marginLeft:3,color:'#F87171',fontWeight:900}}>HOL</span>}</span>
                              {tm&&<span className="cell-time">{tm}</span>}
                              {hrs>0&&<span className="cell-hours" style={flag==='OT'?{color:'#E8890C',fontWeight:800}:flag==='HOL'?{color:'#F87171',fontWeight:800}:{}}>{hrs}h</span>}
                              {showDeptBadge&&<span style={{fontSize:7,fontWeight:800,color:dept.color,marginTop:2,letterSpacing:'.04em'}}>◆ LOANED</span>}</>
                            )}
                          </div>
                        </td>
                      );
                    })}
                    <td className="td-total" style={{color:total>=40?'#16A34A':total>=32?'#E8890C':'#6B6F85'}}>{total>0?total:'—'}</td>
                  </tr>
                );
              })}
            </React.Fragment>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ─── DailyLaborView ───────────────────────────────────────────────────────────
function DailyLaborView({ employees, laborData, actuals }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const [view, setView] = useState('$'); // '$' or 'h'

  // Scheduled hours per dept per day
  const schedHrs = useMemo(()=>{
    const r={}; DEPTS.forEach(d=>{r[d.id]=Array(7).fill(0);});
    employees.forEach(e=>{ e.shifts.forEach(([,h],di)=>{ if(h>0) r[e.dept][di]=(r[e.dept][di]||0)+h; }); });
    return r;
  },[employees]);

  // Totals per day across all depts
  const dayTotals = useMemo(()=>{
    return Array(7).fill(0).map((_,di)=>{
      const hrs=DEPTS.reduce((s,d)=>s+(schedHrs[d.id]?.[di]||0),0);
      const fcst=DEPTS.reduce((s,d)=>s+(schedHrs[d.id]?.[di]||0)*(AVG_RATES[d.id]||30),0);
      const act=DEPTS.reduce((s,d)=>s+(actuals?.[d.id]?.[di]?.amount||0),0);
      return {hrs,fcst,act};
    });
  },[schedHrs,actuals]);

  const weekTotals = useMemo(()=>({
    hrs:DEPTS.reduce((s,d)=>s+(schedHrs[d.id]||[]).reduce((a,b)=>a+b,0),0),
    fcst:laborData.reduce((s,l)=>s+l.forecast,0),
    act:DEPTS.reduce((s,d)=>s+(actuals?.[d.id]?.total||0),0),
  }),[schedHrs,actuals,laborData]);

  return (
    <div className="dl-view">
      <div className="dl-header">
        <div className="dl-header-title">Daily Labor — Week of Mar 23–29, 2026</div>
        <div className="dl-stat"><span className="dl-stat-label">Total Sched Hrs</span><span className="dl-stat-val">{weekTotals.hrs}h</span></div>
        <div className="dl-stat"><span className="dl-stat-label">Monthly Forecast</span><span className="dl-stat-val" style={{color:'#E8890C'}}>{fmt$(weekTotals.fcst)}</span></div>
        <div className="dl-stat"><span className="dl-stat-label">MTD Actual</span><span className="dl-stat-val" style={{color:weekTotals.act>0?'#16A34A':'#6B6F85'}}>{weekTotals.act>0?fmt$(weekTotals.act):'Not imported'}</span></div>
        <div style={{marginLeft:'auto',display:'flex',gap:4}}>
          {['$','h'].map(v=><button key={v} onClick={()=>setView(v)} style={{padding:'5px 12px',borderRadius:6,border:'1px solid #3A3D50',background:view===v?'#2A2D3A':'transparent',color:view===v?'#fff':'#8B8FA8',cursor:'pointer',fontSize:12,fontWeight:700}}>{v==='$'?'Show $':'Show Hrs'}</button>)}
        </div>
      </div>
      <div className="dl-body">
        {/* Events banner */}
        <div className="events-bar">
          {DAYS.map((d,i)=>(
            <div key={d} className="event-day" style={i===3||i===4?{background:'#6366F108'}:i===5||i===6?{background:'#06B6D408'}:{}}>
              <div className="event-day-label">{d}</div>
              <div className="event-day-date">{WEEK_DATES[i][0]}</div>
              <div className="event-day-name">{WEEK_EVENTS[i]?.event}</div>
            </div>
          ))}
        </div>

        {/* Grid */}
        <div style={{overflowX:'auto'}}>
          <table className="dl-table">
            <thead><tr>
              <th className="dept-col">Department</th>
              {DAYS.map((d,i)=><th key={d}>{d} <span style={{color:'#4A4D60',fontWeight:500}}>{WEEK_DATES[i][0]}</span></th>)}
              <th className="total-col">Week Total</th>
              <th>Monthly Fcst</th>
              <th>MTD Actual</th>
              <th>Remaining</th>
            </tr></thead>
            <tbody>
              {DEPTS.map(dept=>{
                const hrs=schedHrs[dept.id]||Array(7).fill(0);
                const rate=AVG_RATES[dept.id]||30;
                const ld=laborData.find(l=>l.dept===dept.id)||{};
                const weekHrs=hrs.reduce((s,h)=>s+h,0);
                const weekFcst=weekHrs*rate;
                const actTotal=actuals?.[dept.id]?.total||0;
                const remaining=(ld.budget||ld.forecast||0)-actTotal;
                return (
                  <tr key={dept.id} className="dl-td">
                    <td className="dl-dept-cell">
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <div style={{width:10,height:10,borderRadius:'50%',background:dept.color,flexShrink:0}}/>
                        <div><div className="dl-dept-name" style={{color:dept.color}}>{dept.label}</div>
                          <div className="dl-dept-role">{weekHrs}h this week</div></div>
                      </div>
                    </td>
                    {hrs.map((h,di)=>{
                      const fcst=h*rate;
                      const actD=actuals?.[dept.id]?.[di];
                      const actAmt=actD?.amount||0;
                      const actH=actD?.hours||0;
                      const varAmt=actAmt-fcst;
                      return (
                        <td key={di} className="dl-td" style={{borderRight:'1px solid #22253240',padding:'6px 8px',textAlign:'center',background:actAmt>0&&varAmt>0?'#DC262608':actAmt>0&&varAmt<=0?'#16A34A08':'transparent'}}>
                          {h===0&&!actAmt?<span style={{color:'#3A3D50',fontSize:11}}>—</span>:(
                            <div className="dl-metric">
                              <div className="dl-metric-row">
                                <span className="dl-metric-lbl">Sched</span>
                                <span className="dl-metric-val" style={{color:'#8B8FA8'}}>{view==='$'?fmt$(fcst):fmtH(h)}</span>
                              </div>
                              {actAmt>0 && <>
                                <div className="dl-metric-row" style={{background:'#1C1E26',borderRadius:3}}>
                                  <span className="dl-metric-lbl">Actual</span>
                                  <span className="dl-metric-val" style={{color:'#E8EAF0'}}>{view==='$'?fmt$(actAmt):fmtH(actH)}</span>
                                </div>
                                <div className="dl-metric-row">
                                  <span className="dl-metric-lbl">Var</span>
                                  <span className={`dl-metric-val ${varAmt>0?'dl-var-neg':'dl-var-pos'}`}>{varAmt>0?'+':''}{view==='$'?fmt$(varAmt):fmtH(actH-h)}</span>
                                </div>
                              </>}
                            </div>
                          )}
                        </td>
                      );
                    })}
                    <td className="dl-total-cell">
                      <div className="dl-total-hrs">{weekHrs}h</div>
                      <div className="dl-total-fcst">{fmt$(weekFcst)}</div>
                      {actTotal>0&&<div className="dl-total-act" style={{color:actTotal>weekFcst?'#F87171':'#4ADE80'}}>{fmt$(actTotal)}</div>}
                    </td>
                    <td style={{padding:'6px 10px',textAlign:'right',fontSize:12,fontWeight:700,color:'#E8890C'}}>{fmt$(ld.forecast)}</td>
                    <td style={{padding:'6px 10px',textAlign:'right',fontSize:12,fontWeight:700,color:actTotal>0?'#E8EAF0':'#4A4D60'}}>{actTotal>0?fmt$(actTotal):'—'}</td>
                    <td style={{padding:'6px 10px',textAlign:'right',fontSize:13,fontWeight:800}}
                      className={remaining>=0?'pos':'neg'}>{remaining!==0?(remaining>=0?'+':'')+fmt$(Math.abs(remaining)):'—'}</td>
                  </tr>
                );
              })}
              {/* Totals row */}
              <tr style={{borderTop:'2px solid #2A2D3A',background:'#13151C'}}>
                <td className="dl-dept-cell" style={{fontWeight:800,fontSize:12,color:'#fff'}}>TOTAL</td>
                {dayTotals.map((dt,di)=>(
                  <td key={di} style={{padding:'8px 8px',textAlign:'center',borderRight:'1px solid #22253240'}}>
                    <div style={{fontSize:12,fontWeight:800,color:'#E8EAF0'}}>{dt.hrs>0?(view==='$'?fmt$(dt.fcst):dt.hrs+'h'):'—'}</div>
                    {dt.act>0&&<div style={{fontSize:10,color:'#4ADE80',marginTop:2}}>{view==='$'?fmt$(dt.act):dt.act+'h'}</div>}
                  </td>
                ))}
                <td className="dl-total-cell" style={{fontSize:14,fontWeight:900,color:'#E8EAF0'}}>{weekTotals.hrs}h<div style={{fontSize:10,color:'#E8890C'}}>{fmt$(weekTotals.fcst)}</div></td>
                <td style={{padding:'8px 10px',textAlign:'right',fontSize:13,fontWeight:800,color:'#E8890C'}}>{fmt$(weekTotals.fcst)}</td>
                <td style={{padding:'8px 10px',textAlign:'right',fontSize:13,fontWeight:800,color:weekTotals.act>0?'#E8EAF0':'#4A4D60'}}>{weekTotals.act>0?fmt$(weekTotals.act):'—'}</td>
                <td style={{padding:'8px 10px',textAlign:'right',fontSize:14,fontWeight:900}} className={weekTotals.act>0?(weekTotals.fcst-weekTotals.act>=0?'pos':'neg'):''}>{weekTotals.act>0?fmt$(weekTotals.fcst-weekTotals.act):'—'}</td>
              </tr>
            </tbody>
          </table>
        </div>

        {/* Declining Balance Cards */}
        <div className="dl-balance-section">
          <div className="dl-balance-title">Declining Balance — March 2026</div>
          <div className="dl-balance-grid">
            {laborData.map(ld=>{
              const dept=getDept(ld.dept);
              const actTotal=actuals?.[ld.dept]?.total||0;
              const base=Math.max(ld.budget||ld.forecast,ld.forecast,actTotal,1);
              const remaining=(ld.budget||ld.forecast)-actTotal;
              return (
                <div className="dl-balance-card" key={ld.dept}>
                  <div className="dl-bc-header">
                    <div className="dl-bc-dot" style={{background:dept.color}}/>
                    <span className="dl-bc-name" style={{color:dept.color}}>{dept.label}</span>
                    <span className="dl-bc-budget" style={{fontSize:11}}>{ld.budget>0?`Budget: ${fmt$(ld.budget)}`:'Forecast Only'}</span>
                  </div>
                  <div className="dl-bc-bars">
                    {ld.budget>0&&<div className="dl-bc-bar-row">
                      <span className="dl-bc-label">Budget</span>
                      <div className="dl-bc-track"><div className="dl-bc-fill" style={{width:'100%',background:'#4A4D60'}}/></div>
                      <span className="dl-bc-value" style={{color:'#6B6F85'}}>{fmt$(ld.budget)}</span>
                    </div>}
                    <div className="dl-bc-bar-row">
                      <span className="dl-bc-label">Forecast</span>
                      <div className="dl-bc-track"><div className="dl-bc-fill" style={{width:`${Math.min(100,ld.forecast/base*100)}%`,background:dept.color+'88'}}/></div>
                      <span className="dl-bc-value" style={{color:dept.color}}>{fmt$(ld.forecast)}</span>
                    </div>
                    <div className="dl-bc-bar-row">
                      <span className="dl-bc-label">Actual</span>
                      <div className="dl-bc-track"><div className="dl-bc-fill" style={{width:`${Math.min(100,actTotal/base*100)}%`,background:dept.color}}/></div>
                      <span className="dl-bc-value" style={{color:'#E8EAF0'}}>{actTotal>0?fmt$(actTotal):'—'}</span>
                    </div>
                  </div>
                  <div className="dl-bc-remaining">
                    <span className="dl-bc-rem-label">Remaining</span>
                    <span className={`dl-bc-rem-val ${remaining>=0?'pos':'neg'}`}>{remaining>=0?'+':''}{fmt$(Math.abs(remaining))}</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── ImportView ───────────────────────────────────────────────────────────────
function ImportView({ onApply, actuals, activeWeek }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const [text, setText]       = useState('');
  const [parsed, setParsed]   = useState(null);
  const [msg, setMsg]         = useState(null); // {type:'ok'|'err', text}
  const fileRef = useRef();

  const parseData = (raw) => {
    const lines = raw.trim().split('\n').filter(l=>l.trim());
    let headerIdx = lines.findIndex(l=>l.includes('Per No') || l.includes('Work Cost Center'));
    const dataLines = headerIdx>=0 ? lines.slice(headerIdx+1) : lines;
    const records=[]; let skipped=0, outOfMonth=0;
    const MARCH_START_SERIAL = 46082; // 3/1/26
    const MARCH_END_SERIAL   = 46112; // 3/31/26
    dataLines.forEach(line=>{
      const cols = line.split('\t');
      if(cols.length < 20) { skipped++; return; }
      const name=cols[1]?.trim(), cc=cols[11]?.trim(), wd=cols[12]?.trim();
      const hrs=parseFloat(cols[18])||0, amt=parseFloat(cols[19])||0;
      const dateSerial=parseFloat(cols[20]);
      if(!cc||isNaN(dateSerial)) { skipped++; return; }
      const dept=mapCostCenter(cc,wd);
      if(!dept) { skipped++; return; }
      const serialInt = Math.round(dateSerial);
      if (serialInt < MARCH_START_SERIAL || serialInt > MARCH_END_SERIAL) { outOfMonth++; return; }
      const monthDay = serialInt - MARCH_START_SERIAL + 1; // 1..31
      // Which week does this monthDay fall in? Find week containing it in dayIdx
      let wkId=null, dayIdx=null;
      for (const wk of (window.WEEKS||[])) {
        const i = wk.dayIdx.indexOf(monthDay);
        if (i>=0) { wkId=wk.id; dayIdx=i; break; }
      }
      records.push({
        name, dept, hours:hrs, amount:amt, cc,
        monthDay, wkId, dayIdx,
        date: `3/${monthDay}`,
      });
    });
    if(!records.length) { setMsg({type:'err',text:`No matching records found. Ensure you're pasting from the One & Done report (tab-separated). Skipped ${skipped} rows${outOfMonth?`, ${outOfMonth} outside March 2026`:''}.`}); return; }
    // Group by week → dept → dayIdx (for per-week dashboard summaries)
    const byWeek = {};
    records.forEach(r=>{
      if (!r.wkId) return;
      if(!byWeek[r.wkId]) byWeek[r.wkId] = {};
      const g = byWeek[r.wkId];
      if(!g[r.dept]) g[r.dept]={};
      if(!g[r.dept][r.dayIdx]) g[r.dept][r.dayIdx]={hours:0,amount:0,count:0};
      g[r.dept][r.dayIdx].hours += r.hours;
      g[r.dept][r.dayIdx].amount += r.amount;
      g[r.dept][r.dayIdx].count++;
    });
    Object.values(byWeek).forEach(g=>{
      Object.keys(g).forEach(d=>{
        g[d].total = Object.values(g[d]).reduce((s,v)=>s+(v.amount||0),0);
        g[d].totalHrs = Object.values(g[d]).filter(v=>typeof v==='object').reduce((s,v)=>s+(v.hours||0),0);
      });
    });
    // Also keep the old "grouped" for the active week — that's what feeds the Daily Labor dashboard preview below
    const grouped = byWeek[activeWeek] || Object.values(byWeek)[0] || {};
    const weekCount = Object.keys(byWeek).length;
    const dayRange = records.reduce((r,rec)=>({min:Math.min(r.min,rec.monthDay),max:Math.max(r.max,rec.monthDay)}),{min:32,max:0});
    setParsed({grouped, byWeek, records, skipped, outOfMonth, total:records.length, weekCount, dayRange});
    setMsg({type:'ok',text:`Parsed ${records.length} records · ${dayRange.min>dayRange.max?'no dates':'3/'+dayRange.min+'–3/'+dayRange.max} · ${weekCount} week${weekCount>1?'s':''} · ${Object.keys(grouped).length} depts. Click Apply.`});
  };

  const handleFile = e => {
    const f=e.target.files?.[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload = ev => { setText(ev.target.result); parseData(ev.target.result); };
    reader.readAsText(f);
  };

  const apply = () => {
    if(!parsed) return;
    onApply(parsed.grouped, parsed.records);
    setMsg({type:'ok',text:`✓ Applied ${parsed.total} records to Daily Labor dashboard.`});
    setParsed(null); setText('');
  };

  // Summary table from parsed data
  const summaryRows = useMemo(()=>{
    if(!parsed) return [];
    return DEPTS.map(dept=>{
      const d=parsed.grouped[dept.id];
      if(!d) return null;
      const days=Array(7).fill(0).map((_,i)=>d[i]?.amount||0);
      return {dept,days,total:d.total||0,totalHrs:d.totalHrs||0};
    }).filter(Boolean);
  },[parsed]);

  return (
    <div className="import-view">
      <div className="import-layout">
        {/* Instructions */}
        <div>
          <div className="import-card">
            <div className="import-card-title">Import One &amp; Done Report</div>
            <div className="import-card-sub">Actual labor data from payroll that feeds into the declining balance. Column L (Work Cost Center) maps each record to a department.</div>
            <div className="import-steps">
              <div className="import-step"><div className="step-num">1</div><div className="step-text">Open the <strong>One &amp; Done Report</strong> in Excel</div></div>
              <div className="import-step"><div className="step-num">2</div><div className="step-text">Select <strong>all data rows</strong> (including header row 10) → Copy</div></div>
              <div className="import-step"><div className="step-num">3</div><div className="step-text">Paste into the field on the right, or upload the <strong>.xlsx or .csv</strong> file directly</div></div>
              <div className="import-step"><div className="step-num">4</div><div className="step-text">Click <strong>Parse &amp; Preview</strong>, review the summary, then click <strong>Apply</strong></div></div>
            </div>
            <div className="import-card-title" style={{marginBottom:8}}>Cost Center → Department</div>
            <div className="cc-map">
              {[['33416','Group Sales'],['33417 BOH','Kitchen Prem'],['33417','R&C Kitchen'],['33418','R&C FOH'],['33421','Bars'],['33422 BOH','Stewarding'],['33422','Admin'],['55936','Warehouse']].map(([cc,dept])=>(
                <div key={cc}><span>{cc}</span>→ {dept}</div>
              ))}
            </div>
          </div>
          {actuals && Object.keys(actuals).length>0 && (
            <div className="import-card" style={{marginTop:12}}>
              <div className="import-card-title">Currently Imported</div>
              {DEPTS.map(d=>{
                const total=actuals[d.id]?.total||0;
                if(!total) return null;
                return <div key={d.id} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid #2A2D3A',fontSize:12}}>
                  <span style={{color:d.color}}>{d.label}</span>
                  <span style={{fontWeight:700}}>{fmt$(total)}</span>
                </div>;
              })}
            </div>
          )}
        </div>

        {/* Paste/upload area */}
        <div>
          <div className="import-card">
            <div className="import-card-title">Paste Data</div>
            <textarea className="import-textarea" value={text} onChange={e=>{setText(e.target.value);setMsg(null);setParsed(null);}} placeholder="Copy all rows from the One &amp; Done Report in Excel and paste here (Ctrl+V / Cmd+V)&#10;&#10;Expected columns: Per No | Emp Full Name | ... | Work Cost Center (L) | Work Desc (M) | ... | Work Hours (S) | Ext Amount (T) | Work Date (U)"/>
            <div className="import-actions">
              <button className="import-btn" onClick={()=>parseData(text)} disabled={!text.trim()}>Parse &amp; Preview</button>
              <button className="import-btn-sec" onClick={()=>fileRef.current.click()}>Upload File (.csv/.txt)</button>
              <input ref={fileRef} type="file" accept=".csv,.txt,.tsv" style={{display:'none'}} onChange={handleFile}/>
              {text&&<button className="import-btn-sec" onClick={()=>{setText('');setParsed(null);setMsg(null);}}>Clear</button>}
            </div>
            {msg&&<div className={`import-success${msg.type==='err'?' import-error':''}`}>{msg.text}</div>}
          </div>

          {/* Multi-week summary */}
          {parsed && parsed.byWeek && Object.keys(parsed.byWeek).length > 0 && (
            <div className="import-card" style={{marginTop:12}}>
              <div className="import-preview-title">Summary by Week</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12}}>
                {(window.WEEKS||[]).map(wk => {
                  const g = parsed.byWeek[wk.id]; if (!g) return null;
                  const hrs = Object.values(g).reduce((s,d)=>s+(d.totalHrs||0),0);
                  const amt = Object.values(g).reduce((s,d)=>s+(d.total||0),0);
                  const depts = Object.keys(g).length;
                  const isActive = wk.id === activeWeek;
                  return <div key={wk.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 10px',background:isActive?'#E8890C15':'#1C1E26',border:'1px solid '+(isActive?'#E8890C66':'#2A2D3A'),borderRadius:6}}>
                    <span style={{fontWeight:700,color:isActive?'#E8890C':'#C8CAD6'}}>{wk.label}{isActive&&<span style={{fontSize:9,marginLeft:6,letterSpacing:'.05em'}}>← ACTIVE</span>}</span>
                    <span style={{color:'#8B8FA8'}}><strong style={{color:'#E8EAF0'}}>{hrs.toFixed(0)}h</strong> · <strong style={{color:'#E8890C'}}>{fmt$(amt)}</strong> · {depts} dept{depts!==1?'s':''}</span>
                  </div>;
                })}
              </div>
              <div style={{marginTop:10,padding:'8px 10px',background:'#0F172A',border:'1px solid #2563EB44',borderRadius:6,fontSize:11,color:'#93C5FD'}}>
                <strong>Applying will replace actuals for 3/{parsed.dayRange.min}–3/{parsed.dayRange.max}.</strong> Previously imported days outside this range are preserved.
              </div>
            </div>
          )}

          {/* Preview table */}
          {summaryRows.length>0 && (
            <div className="import-card" style={{marginTop:12}}>
              <div className="import-preview-title">Preview — Actuals by Department &amp; Day</div>
              <div style={{overflowX:'auto'}}>
                <table className="preview-table">
                  <thead><tr>
                    <th>Department</th>
                    {DAYS.map((d,i)=><th key={d}>{d}<div style={{color:'#4A4D60',fontWeight:400}}>{WEEK_DATES[i][0]}</div></th>)}
                    <th>Total Hrs</th><th>Total $</th>
                  </tr></thead>
                  <tbody>
                    {summaryRows.map(({dept,days,total,totalHrs})=>(
                      <tr key={dept.id}>
                        <td><span style={{color:dept.color,fontWeight:700}}>{dept.label}</span></td>
                        {days.map((amt,i)=><td key={i} style={{color:amt>0?'#E8EAF0':'#4A4D60'}}>{amt>0?fmt$(amt):'—'}</td>)}
                        <td style={{fontWeight:700,color:'#E8EAF0'}}>{totalHrs>0?totalHrs+'h':'—'}</td>
                        <td style={{fontWeight:800,color:'#E8890C'}}>{fmt$(total)}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
              <div className="import-actions" style={{marginTop:12}}>
                <button className="import-btn" onClick={apply}>Apply to Daily Labor Dashboard</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── PeopleView ───────────────────────────────────────────────────────────────
function PeopleView({ employees, onUpdate, budgetCfg }) {
  const [filter, setFilter] = useState('');

  const defaultPlan = budgetCfg.defaultPlan || 'b';
  const filtered = employees.filter(e=>(e.name+' '+e.role).toLowerCase().includes(filter.toLowerCase()));
  const addEmp = () => {
    if(!newName.trim()) return;
    onUpdate([...employees,{id:Date.now(),name:newName.trim(),dept:newDept,role:newRole.trim()||'Staff',plan:defaultPlan,shifts:Array(7).fill(['',0,''])}]);

    <div className="people-view">
      <div style={{display:'flex',gap:10,marginBottom:14,alignItems:'center'}}>
        <input className="add-inp" style={{maxWidth:260}} placeholder="🔍  Search…" value={filter} onChange={e=>setFilter(e.target.value)}/>
        <span style={{fontSize:11,color:'#6B6F85',marginLeft:'auto'}}>{filtered.length} / {employees.length} employees</span>

      <table className="people-table">
        <thead><tr><th>Name</th><th>Department</th><th>Role</th><th style={{width:100}}>Rate $/hr</th><th style={{width:110}}>H&amp;W Plan</th><th>Sched Hrs</th><th>Wk Cost</th><th/></tr></thead>
        <tbody>
          {filtered.map(e=>{
            const d=getDept(e.dept); const hrs=e.shifts.reduce((s,sh)=>s+(sh[1]||0),0);
            const rate=getEmpRate(e); const wkCost=hrs*rate;
            const isDefault=e.rate==null||e.rate==='';

              <tr key={e.id}>
                <td style={{fontWeight:600,color:'#C8CAD6'}}>{e.name}</td>

                  {DEPTS.map(dep=><option key={dep.id} value={dep.id}>{dep.label}</option>)}
                </select></td>
                <td><input className="role-input" value={e.role} onChange={ev=>onUpdate(employees.map(x=>x.id===e.id?{...x,role:ev.target.value}:x))}/></td>
                <td>
                  <input className="role-input" type="number" step="0.25" min="0" placeholder={`${AVG_RATES[e.dept]||30} (dept)`}
                    value={e.rate==null?'':e.rate}
                    onChange={ev=>onUpdate(employees.map(x=>x.id===e.id?{...x,rate:ev.target.value===''?null:parseFloat(ev.target.value)}:x))}

                </td>
                <td>
                  <div style={{display:'inline-flex',background:'#1C1E26',border:'1px solid #2A2D3A',borderRadius:5,overflow:'hidden'}}>
                    {Object.keys(plans).map(pk=>{
                      const active = (e.plan||defaultPlan)===pk;
                      const isB = pk==='b';
