                        onClick={()=>onUpdate(employees.map(x=>x.id===e.id?{...x,plan:pk}:x))}
                        style={{background:active?(isB?'#2563EB33':'#D97757aa'):'transparent',color:active?(isB?'#93C5FD':'#fff'):'#6B6F85',border:'none',padding:'5px 11px',fontSize:10,fontWeight:800,cursor:'pointer',letterSpacing:'.05em',textTransform:'uppercase'}}>
                        {plans[pk].name.replace(/\s*plan\s*/i,'').trim() || pk.toUpperCase()}
                      </button>;
                    })}
                  </div>
                </td>
                <td style={{fontWeight:700,color:hrs>=40?'#16A34A':hrs>=32?'#E8890C':'#6B6F85'}}>{hrs>0?hrs+'h':'—'}</td>
                <td style={{fontWeight:700,color:'#8B8FA8'}}>{wkCost>0?fmt$(wkCost):'—'}</td>
                <td><button onClick={()=>onUpdate(employees.filter(x=>x.id!==e.id))} style={{background:'transparent',border:'none',color:'#4A4D60',cursor:'pointer',padding:'4px 8px',borderRadius:4,fontSize:13}} onMouseEnter={x=>x.target.style.color='#DC2626'} onMouseLeave={x=>x.target.style.color='#4A4D60'}>✕</button></td>
              </tr>
            );
          })}
        </tbody>
      </table>
      <div className="add-emp-row">
        <input className="add-inp" placeholder="Last, First" value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addEmp()} style={{maxWidth:200}}/>
        <select className="dept-select" value={newDept} onChange={e=>setNewDept(e.target.value)} style={{fontSize:12,padding:'7px 8px'}}>
          {DEPTS.map(d=><option key={d.id} value={d.id}>{d.label}</option>)}
        </select>
        <input className="add-inp" placeholder="Role / Title" value={newRole} onChange={e=>setNewRole(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addEmp()} style={{maxWidth:150}}/>
        <button className="add-btn" onClick={addEmp}>+ Add</button>
      </div>
    </div>
  );
}

// ─── Print Schedule ───────────────────────────────────────────────────────────
function printSchedule(dept, employees, weekLabel) {
  const deptObj = getDept(dept);
  const staff = dept === 'all' ? employees : employees.filter(e => e.dept === dept);
  if (!staff.length) return;

  const cellHtml = ([st, hrs, tm]) => {
    if (!st || st === '') return '<span style="color:#bbb">—</span>';
    if (st === 'OFF') return '<span style="color:#bbb">OFF</span>';
    return `<div style="font-weight:700;font-size:9pt">${st}</div>${tm ? `<div style="font-size:8pt;color:#555">${tm}</div>` : ''}${hrs > 0 ? `<div style="font-size:8pt;color:#777">${hrs}h</div>` : ''}`;
  };

  const rows = staff.map(e => {
    const total = e.shifts.reduce((s, [, h]) => s + (h || 0), 0);
    return `<tr>
      <td style="font-weight:600;padding:5px 8px;border:1px solid #ddd">${e.name}<div style="font-size:8pt;color:#888">${e.role}</div></td>
      ${e.shifts.map(sh => `<td style="padding:5px 6px;text-align:center;border:1px solid #ddd;min-width:70px">${cellHtml(sh)}</td>`).join('')}
      <td style="padding:5px 8px;text-align:center;border:1px solid #ddd;font-weight:800;font-size:11pt;color:${total>=40?'#16a34a':total>=32?'#d97706':'#555'}">${total || '—'}</td>
    </tr>`;
  }).join('');

  const deptGroups = dept === 'all'
    ? DEPTS.map(d => ({ dept: d, emps: staff.filter(e => e.dept === d.id) })).filter(g => g.emps.length)
    : [{ dept: deptObj, emps: staff }];

  const allRows = deptGroups.map(({ dept: d, emps }) => {
    const empRows = emps.map(e => {
      const total = e.shifts.reduce((s, [, h]) => s + (h || 0), 0);
      return `<tr>
        <td style="padding:5px 8px;border:1px solid #ddd">${e.name}<div style="font-size:8pt;color:#888">${e.role}</div></td>
        ${e.shifts.map(sh => `<td style="padding:5px 6px;text-align:center;border:1px solid #ddd;min-width:68px">${cellHtml(sh)}</td>`).join('')}
        <td style="padding:5px 8px;text-align:center;border:1px solid #ddd;font-weight:800">${total || '—'}</td>
      </tr>`;
    }).join('');
    const sectionHdr = dept === 'all' ? `<tr><td colspan="9" style="background:${d.color}22;color:${d.color};font-weight:800;font-size:9pt;letter-spacing:.06em;text-transform:uppercase;padding:6px 8px;border:1px solid #ddd">${d.label} — ${emps.length} staff</td></tr>` : '';
    return sectionHdr + empRows;
  }).join('');

  const totalSchedHrs = staff.reduce((s, e) => s + e.shifts.reduce((ss, [, h]) => ss + (h || 0), 0), 0);

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<title>Schedule — ${deptObj.label} — ${weekLabel}</title>
<style>
  @page{size:landscape;margin:.6in .5in;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',Arial,sans-serif;font-size:10pt;color:#111;}
  .no-print{margin-bottom:12px;}
  @media print{.no-print{display:none;}}
  .hdr{border-bottom:3px solid ${deptObj.color};padding-bottom:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-end;}
  .hdr-left h1{font-size:15pt;font-weight:800;color:#111;letter-spacing:.02em;}
  .hdr-left h1 span{color:${deptObj.color};}
  .hdr-left p{font-size:9pt;color:#666;margin-top:3px;}
  .hdr-right{text-align:right;font-size:9pt;color:#888;}
  table{width:100%;border-collapse:collapse;}
  thead th{background:#f5f5f5;font-weight:700;font-size:9pt;text-align:center;padding:7px 6px;border:1px solid #ddd;letter-spacing:.03em;}
  thead th:first-child{text-align:left;}
  .event-row td{font-size:8pt;color:#888;text-align:center;padding:3px 6px;border:1px solid #eee;font-style:italic;background:#fafafa;}
  .footer{margin-top:12px;padding-top:8px;border-top:1px solid #ddd;font-size:8pt;color:#999;display:flex;justify-content:space-between;}
</style></head><body>
<div class="no-print" style="padding:12px 0">
  <button onclick="window.print()" style="padding:8px 20px;background:${deptObj.color};color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;margin-right:8px">🖨 Print Schedule</button>
  <button onclick="window.close()" style="padding:8px 16px;background:#eee;border:none;border-radius:6px;font-size:13px;cursor:pointer">Close</button>
</div>
<div class="hdr">
  <div class="hdr-left">
    <h1>SCHEDULING <span>MATRIX</span>${dept !== 'all' ? ` — ${deptObj.label.toUpperCase()}` : ' — ALL DEPARTMENTS'}</h1>
    <p>${weekLabel} &nbsp;·&nbsp; ${staff.length} Staff &nbsp;·&nbsp; ${totalSchedHrs} Total Scheduled Hours</p>
  </div>
  <div class="hdr-right">Printed ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}<br/>CONFIDENTIAL</div>
</div>
<table>
  <thead>
    <tr>
      <th style="width:170px;text-align:left">EMPLOYEE</th>
      ${DAYS.map((d,i) => `<th>
        <div>${d}</div>
        <div style="font-weight:500;color:#888">${WEEK_DATES[i][0]}</div>
      </th>`).join('')}
      <th>HRS</th>
    </tr>
    <tr class="event-row">
      <td></td>
      ${WEEK_EVENTS.map(ev => `<td>${ev.event}</td>`).join('')}
      <td></td>
    </tr>
  </thead>
  <tbody>${allRows}</tbody>
</table>
<div class="footer">
  <span>Scheduling Matrix — ${weekLabel}</span>
  <span>${deptObj.label} Schedule</span>
</div>
</body></html>`;

  const win = window.open('', '_blank', 'width=1200,height=800');
  win.document.write(html);
  win.document.close();
}

// ─── Declining Balance View ───────────────────────────────────────────────────
function DecBalView({ laborData, actuals }) {
  const { MARCH_DAYS } = window;
  const [selDept, setSelDept] = useState('kitchen_prem');

  const ld = laborData.find(l => l.dept === selDept) || {};
  const dept = getDept(selDept);
  const budget = ld.budget || ld.forecast || 0;
  const mtdActual = actuals?.[selDept]?.total || 0;
  const remaining = budget - mtdActual;
  const pctUsed = budget > 0 ? Math.min(100, (mtdActual / budget) * 100) : 0;

  // Build day rows with running balance
  const rows = useMemo(() => {
    const rate = AVG_RATES[selDept] || 30;
    let runBalance = budget;
    let cumFcst = 0;
    return MARCH_DAYS.map((day, i) => {
      // Forecast: use file data for kp/rc, else 0
      const dayFcst = selDept === 'kitchen_prem' ? (day.kp?.f || 0)
                    : selDept === 'rc_kitchen'   ? (day.rc?.f || 0)
                    : 0;
      const dayFcstHrs = selDept === 'kitchen_prem' ? (day.kp?.h || 0)
                       : selDept === 'rc_kitchen'   ? (day.rc?.h || 0)
                       : 0;
      // Actual: from import (by day index within our week, 3/23=idx0…3/29=idx6)
      const weekStart = new Date(2026, 2, 23); // March 23
      const dayDate = new Date(2026, 2, parseInt(day.date.split('/')[1]));
      const di = Math.round((dayDate - weekStart) / 86400000);
      const actD = (di >= 0 && di <= 6) ? actuals?.[selDept]?.[di] : null;
      const dayAct = actD?.amount || 0;
      const dayActHrs = actD?.hours || 0;

      if (dayAct > 0) runBalance -= dayAct;
      cumFcst += dayFcst;

      const isCurrentWeek = di >= 0 && di <= 6;
      const isPast = (() => { const d=new Date(2026,2,parseInt(day.date.split('/')[1])); return d < new Date(2026,2,23); })();
      const isFuture = (() => { const d=new Date(2026,2,parseInt(day.date.split('/')[1])); return d > new Date(2026,2,29); })();

      return { ...day, i, dayFcst, dayFcstHrs, dayAct, dayActHrs, runBalance, cumFcst, isCurrentWeek, isPast, isFuture };
    });
  }, [selDept, actuals, budget]);

  const totalFcst = rows.reduce((s, r) => s + r.dayFcst, 0);

  return (
    <div className="db-view">
      <div className="db-header">
        <div style={{ display:'flex', alignItems:'center', gap:12, marginBottom:12 }}>
          <div className="db-title">Declining Balance — March 2026</div>
          <select className="db-dept-select" value={selDept} onChange={e => setSelDept(e.target.value)}>
            {DEPTS.map(d => <option key={d.id} value={d.id}>{d.label}</option>)}
          </select>
        </div>
        <div className="db-summary">
          {ld.budget > 0 && <div className="db-big">
            <span className="db-big-label">Monthly Budget</span>
            <span className="db-big-val" style={{ color:'#4A4D60' }}>{fmt$(ld.budget)}</span>
          </div>}
          <div className="db-big">
            <span className="db-big-label">Monthly Forecast</span>
            <span className="db-big-val" style={{ color: dept.color }}>{fmt$(ld.forecast)}</span>
          </div>
          <div className="db-big">
            <span className="db-big-label">MTD Actual</span>
            <span className="db-big-val" style={{ color: mtdActual > 0 ? '#E8EAF0' : '#4A4D60' }}>{mtdActual > 0 ? fmt$(mtdActual) : 'Not imported'}</span>
          </div>
          <div className="db-big">
            <span className="db-big-label">Remaining Balance</span>
            <span className={`db-big-val ${remaining >= 0 ? 'pos' : 'neg'}`}>{remaining >= 0 ? '+' : ''}{fmt$(Math.abs(remaining))}</span>
            <div className="db-progress-bar" style={{ marginTop: 8 }}>
              <div className="db-progress-fill" style={{ width: `${pctUsed}%`, background: pctUsed > 90 ? '#DC2626' : pctUsed > 70 ? '#E8890C' : dept.color }} />
            </div>
            <div style={{ fontSize:9, color:'#6B6F85', marginTop:3 }}>{pctUsed.toFixed(1)}% used</div>
          </div>
          <div className="db-big" style={{ marginLeft:8 }}>
            <span className="db-big-label">Total Forecasted</span>
            <span className="db-big-val" style={{ color:'#8B8FA8', fontSize:16 }}>{fmt$(totalFcst)}</span>
          </div>
        </div>
      </div>

      <div className="db-body">
        <div style={{ overflowX:'auto' }}>
          <table className="db-table">
            <thead>
              <tr>
                <th>Date</th><th>Day</th><th>Event</th>
                <th className="num">Fcst Hrs</th>
                <th className="num">Forecast $</th>
                <th className="num">Actual $</th>
                <th className="num">Variance</th>
                <th className="num">Running Balance</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => {
                const varAmt = r.dayAct > 0 ? r.dayAct - r.dayFcst : null;
                const rowClass = r.isFuture ? 'db-row future' : r.isCurrentWeek ? 'db-row week-row' : r.dayAct > 0 && varAmt <= 0 ? 'db-row has-actual-good' : r.dayAct > 0 ? 'db-row has-actual-bad' : 'db-row';
                const balColor = r.runBalance < 0 ? '#F87171' : r.runBalance < budget * 0.2 ? '#E8890C' : '#4ADE80';
                const balPct = budget > 0 ? Math.max(0, Math.min(100, (r.runBalance / budget) * 100)) : 100;
                return (
                  <tr key={i} className={rowClass}>
                    <td className="db-td date" style={r.isCurrentWeek?{color:dept.color}:{}}>{r.date}</td>
                    <td className="db-td dow">{r.dow}</td>
                    <td className="db-td event">{r.event || '—'}</td>
                    <td className="db-td num" style={{color:'#6B6F85'}}>{r.dayFcstHrs > 0 ? r.dayFcstHrs+'h' : '—'}</td>
                    <td className="db-td num" style={{color:'#8B8FA8'}}>{r.dayFcst > 0 ? fmt$(r.dayFcst) : '—'}</td>
                    <td className="db-td num" style={{color: r.dayAct > 0 ? '#E8EAF0' : '#3A3D50'}}>{r.dayAct > 0 ? fmt$(r.dayAct) : '—'}</td>
                    <td className={`db-td num ${varAmt === null ? 'db-var-zero' : varAmt > 0 ? 'db-var-neg' : 'db-var-pos'}`}>
                      {varAmt !== null ? (varAmt > 0 ? '+' : '') + fmt$(varAmt) : '—'}
                    </td>
                    <td className="db-td num balance" style={{color: balColor}}>
                      {budget > 0 ? fmt$(r.runBalance) : '—'}
                      {budget > 0 && <span className="db-balance-bar"><span className="db-balance-fill" style={{width:`${balPct}%`,background:balColor,opacity:.7}}/></span>}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ─── Statistics View ──────────────────────────────────────────────────────────
function StatsView({ employees, canonEmployees, weekShifts, budgetCfg, laborData, actuals }) {
  const { dates: WEEK_DATES, events: WEEK_EVENTS_CTX } = useWeek();
  const WEEK_EVENTS = WEEK_EVENTS_CTX;
  const schedHrsByDept = useMemo(() => {
    const m = {}; DEPTS.forEach(d => { m[d.id] = 0; });
    employees.forEach(e => { const h = e.shifts.reduce((s,[,h])=>s+(h||0),0); m[e.dept] = (m[e.dept]||0)+h; });
    return m;
  }, [employees]);

  const hrsByDay = useMemo(() => {
    const arr = Array(7).fill(0);
    employees.forEach(e => { e.shifts.forEach(([,h],di) => { if(h>0) arr[di]+=h; }); });
    return arr;
  }, [employees]);

  const totalHrs = Object.values(schedHrsByDept).reduce((s,h)=>s+h,0);
  const totalFcst = laborData.reduce((s,l)=>s+l.forecast,0);
  const totalBudget = laborData.reduce((s,l)=>s+(l.budget||0),0);
  const totalAct = DEPTS.reduce((s,d)=>s+(actuals?.[d.id]?.total||0),0);
  const staffScheduled = employees.filter(e=>e.shifts.some(([s])=>s&&s!=='OFF'&&s!=='')).length;
  const avgHrs = staffScheduled > 0 ? (totalHrs/staffScheduled).toFixed(1) : 0;
  const maxDayHrs = Math.max(...hrsByDay, 1);
  const maxDayIdx = hrsByDay.indexOf(Math.max(...hrsByDay));

  // Per dept stats
  const deptStats = DEPTS.map(d => {
    const ld = laborData.find(l=>l.dept===d.id)||{};
    const hrs = schedHrsByDept[d.id]||0;
    const rate = AVG_RATES[d.id]||30;
    const wkFcst = hrs*rate;
    const actAmt = actuals?.[d.id]?.total||0;
    const actHrs = DEPTS.reduce((s)=>s,0); // placeholder
    const varAmt = actAmt > 0 ? actAmt - ld.forecast : null;
    const varPct = ld.forecast > 0 && varAmt !== null ? (varAmt/ld.forecast)*100 : null;
    const util = ld.budget > 0 ? Math.min(120,((actAmt||ld.forecast)/ld.budget)*100) : null;
    const staff = employees.filter(e=>e.dept===d.id).length;
    return { dept:d, ld, hrs, wkFcst, actAmt, varAmt, varPct, util, staff };
  }).filter(r=>r.staff>0 || r.ld.forecast>0);

  // Event analysis
  const eventGroups = { 'Dark':[], 'Active Event':[] };
  WEEK_EVENTS.forEach((ev,i)=>{
    const key = ev.event === 'Dark' ? 'Dark' : 'Active Event';
    const hrs = hrsByDay[i]; const fcst = hrs*(totalHrs>0?(totalFcst/totalHrs):30);
    eventGroups[key].push({day:DAYS[i],hrs,fcst});
  });

  const insights = [
    hrsByDay[maxDayIdx]>0 && { icon:'📅', text:<><strong>{DAYS[maxDayIdx]}</strong> is the busiest day — {hrsByDay[maxDayIdx]}h scheduled</> },
    avgHrs>0 && { icon:'⏱', text:<>Average <strong>{avgHrs} hours</strong> per scheduled employee</> },
    totalAct>0 && totalAct>totalFcst && { icon:'⚠️', text:<>MTD actuals exceed forecast by <strong style={{color:'#F87171'}}>{fmt$(totalAct-totalFcst)}</strong></> },
    totalAct>0 && totalAct<=totalFcst && { icon:'✅', text:<>MTD actuals under forecast — <strong style={{color:'#4ADE80'}}>{fmt$(totalFcst-totalAct)}</strong> remaining</> },
    deptStats.filter(d=>d.util>100).length>0 && { icon:'🔴', text:<>{deptStats.filter(d=>d.util>100).map(d=>d.dept.label).join(', ')} over budget</> },
    employees.filter(e=>e.shifts.reduce((s,[,h])=>s+(h||0),0)>40).length>0 && { icon:'🕐', text:<><strong>{employees.filter(e=>e.shifts.reduce((s,[,h])=>s+(h||0),0)>40).length} employees</strong> scheduled for overtime (40+ hrs)</> },
  ].filter(Boolean);

  return (
    <div className="stats-view">
      {/* KPI Cards */}
      <div className="stats-section">
        <div className="stats-section-title">Key Metrics — Week of Mar 23–29, 2026</div>
        <div className="kpi-grid">
          {[
            { label:'Staff Scheduled', val:staffScheduled, sub:`of ${employees.length} total` },
            { label:'Total Sched Hours', val:totalHrs+'h', sub:`${avgHrs}h avg/person` },
            { label:'Monthly Forecast', val:fmt$(totalFcst), sub:'All departments', color:'#E8890C' },
            totalBudget>0 && { label:'Monthly Budget', val:fmt$(totalBudget), sub:'Authorized spend', color:'#6B6F85' },
            totalAct>0 && { label:'MTD Actual', val:fmt$(totalAct), sub:`${((totalAct/totalFcst)*100).toFixed(1)}% of forecast`, color: totalAct<=totalFcst?'#4ADE80':'#F87171' },
            totalAct>0 && { label:'Remaining', val:(totalFcst-totalAct>=0?'+':'')+fmt$(totalFcst-totalAct), sub:'vs forecast', color:totalFcst-totalAct>=0?'#4ADE80':'#F87171' },
          ].filter(Boolean).map((k,i)=>(
            <div className="kpi-card" key={i}>
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-val" style={{color:k.color||'#E8EAF0'}}>{k.val}</div>
              <div className="kpi-sub">{k.sub}</div>
            </div>
          ))}
        </div>
      </div>

      {/* FOH/BOH + Premium/R&C split */}
      <div className="stats-section">
        <div className="stats-section-title">Labor Breakdown</div>
        <div className="stats-two-col">
          {[
            {title:'Front of House vs Back of House', pairs:[['Front of House',DEPT_GROUPS.foh,'#06B6D4'],['Back of House',DEPT_GROUPS.boh,'#E8890C']]},
            {title:'Premium vs R&C',                  pairs:[['Premium',DEPT_GROUPS.premium,'#E8890C'],['R&C',DEPT_GROUPS.rc,'#4ADE80']]},
          ].map(({title,pairs})=>{
            const rows = pairs.map(([label,ids,color])=>{
              const hrs = ids.reduce((s,id)=>s+(schedHrsByDept[id]||0),0);
              const fcst = ids.reduce((s,id)=>s+(laborData.find(l=>l.dept===id)?.forecast||0),0);
              const act = ids.reduce((s,id)=>s+(actuals?.[id]?.total||0),0);
              const staff = ids.reduce((s,id)=>s+employees.filter(e=>e.dept===id).length,0);
              return {label,ids,color,hrs,fcst,act,staff};
            });
            const totHrs = rows.reduce((s,r)=>s+r.hrs,0)||1;
            const totFcst = rows.reduce((s,r)=>s+r.fcst,0)||1;
            const totAct = rows.reduce((s,r)=>s+r.act,0);
            return (
              <div key={title} className="stats-card">
                <div className="stats-card-title">{title}</div>
                {rows.map(r=>(
                  <div key={r.label} style={{marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                      <span style={{fontSize:12,fontWeight:700,color:r.color}}>{r.label}</span>
                      <span style={{fontSize:10,color:'#6B6F85'}}>{r.staff} staff · {r.hrs}h</span>
                    </div>
                    <div style={{display:'flex',gap:6,marginBottom:3}}>
                      <span style={{fontSize:9,color:'#4A4D60',width:52,fontWeight:700}}>HOURS</span>
                      <div style={{flex:1,height:6,background:'#2A2D3A',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${(r.hrs/totHrs)*100}%`,background:r.color+'aa'}}/></div>
                      <span style={{fontSize:10,fontWeight:700,minWidth:64,textAlign:'right',color:'#8B8FA8'}}>{((r.hrs/totHrs)*100).toFixed(0)}%</span>
                    </div>
                    <div style={{display:'flex',gap:6,marginBottom:3}}>
                      <span style={{fontSize:9,color:'#4A4D60',width:52,fontWeight:700}}>FORECAST</span>
                      <div style={{flex:1,height:6,background:'#2A2D3A',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${(r.fcst/totFcst)*100}%`,background:r.color}}/></div>
                      <span style={{fontSize:10,fontWeight:700,minWidth:64,textAlign:'right',color:r.color}}>{fmt$(r.fcst)}</span>
                    </div>
                    {totAct>0 && <div style={{display:'flex',gap:6}}>
                      <span style={{fontSize:9,color:'#4A4D60',width:52,fontWeight:700}}>ACTUAL</span>
                      <div style={{flex:1,height:6,background:'#2A2D3A',borderRadius:3,overflow:'hidden'}}>
                        <div style={{height:'100%',width:`${totAct>0?(r.act/totAct)*100:0}%`,background:'#E8EAF0'}}/></div>
                      <span style={{fontSize:10,fontWeight:700,minWidth:64,textAlign:'right',color:'#E8EAF0'}}>{r.act>0?fmt$(r.act):'—'}</span>
                    </div>}
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>

      {/* Supervisor Labor — daily × dept */}
      <div className="stats-section">
        <div className="stats-section-title">Supervisor Labor by Day <span style={{color:'#6B6F85',fontWeight:500,textTransform:'none',letterSpacing:0,marginLeft:6}}>(Manager, Chef, Sous, Lead, Captain, Supervisor, Director)</span></div>
        <div style={{background:'#1C1E26',border:'1px solid #2A2D3A',borderRadius:10,overflow:'hidden'}}>
          <table className="perf-table" style={{minWidth:900}}>
            <thead>
              <tr>
                <th>Department</th><th>Supervisors</th>
                {DAYS.map(d=><th key={d} className="r">{d}</th>)}
                <th className="r">Wk Hrs</th><th className="r">Wk Cost</th>
              </tr>
            </thead>
            <tbody>
              {(() => {
                const isSup = e => /manager|chef|sous|lead|captain|supervisor|director|\bhead\b/i.test(e.role||'');
                const sups = employees.filter(isSup);
                const rows = DEPTS.map(d=>{
                  const deptSups = sups.filter(s=>s.dept===d.id);
                  if(!deptSups.length) return null;
                  const perDay = Array(7).fill(0).map((_,i)=>({h:0,c:0}));
                  deptSups.forEach(s=>{
                    s.shifts.forEach((sh,i)=>{
                      const hrs = sh[1]||0;
                      if(hrs>0){ perDay[i].h += hrs; perDay[i].c += hrs * getEmpRate(s); }
                    });
                  });
                  const wkH = perDay.reduce((s,p)=>s+p.h,0);
                  const wkC = perDay.reduce((s,p)=>s+p.c,0);
                  return { d, deptSups, perDay, wkH, wkC };
                }).filter(Boolean);
                if(!rows.length) return <tr><td colSpan={11} style={{textAlign:'center',color:'#4A4D60',padding:'20px 0',fontSize:11}}>No supervisor roles detected. Add roles like "Manager", "Chef", "Sous Chef", "Lead", "Captain" in the People tab.</td></tr>;
                const tot = { perDay:Array(7).fill(0).map(()=>({h:0,c:0})), wkH:0, wkC:0 };
                rows.forEach(r=>{ r.perDay.forEach((p,i)=>{ tot.perDay[i].h += p.h; tot.perDay[i].c += p.c; }); tot.wkH+=r.wkH; tot.wkC+=r.wkC; });
                return <>
                  {rows.map(({d,deptSups,perDay,wkH,wkC})=>(
                    <tr key={d.id}>
                      <td><span style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:9,height:9,borderRadius:'50%',background:d.color,display:'inline-block'}}/><span style={{color:d.color,fontWeight:700}}>{d.label}</span></span></td>
                      <td style={{color:'#8B8FA8',fontSize:11,maxWidth:180,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}} title={deptSups.map(s=>s.name+' ('+s.role+')').join(', ')}>{deptSups.length} — {deptSups.map(s=>s.name.split(',')[0]).join(', ')}</td>
                      {perDay.map((p,i)=>(
                        <td key={i} style={{textAlign:'right',padding:'6px 10px'}}>
                          {p.h>0?<><div style={{fontWeight:700,color:'#E8EAF0',fontSize:11}}>{p.h}h</div><div style={{fontSize:9,color:'#6B6F85'}}>{fmt$(p.c)}</div></>:<span style={{color:'#3A3D50'}}>—</span>}
                        </td>
                      ))}
                      <td style={{textAlign:'right',fontWeight:800,color:d.color}}>{wkH}h</td>
                      <td style={{textAlign:'right',fontWeight:800,color:d.color}}>{fmt$(wkC)}</td>
                    </tr>
                  ))}
                  <tr className="tot-row" style={{background:'#13151C',borderTop:'2px solid #2A2D3A'}}>
                    <td style={{fontWeight:800}}>Total</td>
                    <td style={{color:'#6B6F85',fontSize:11}}>{sups.length} total</td>
                    {tot.perDay.map((p,i)=>(
                      <td key={i} style={{textAlign:'right',padding:'6px 10px'}}>
                        {p.h>0?<><div style={{fontWeight:800,color:'#E8EAF0',fontSize:11}}>{p.h}h</div><div style={{fontSize:9,color:'#8B8FA8'}}>{fmt$(p.c)}</div></>:<span style={{color:'#3A3D50'}}>—</span>}
                      </td>
                    ))}
                    <td style={{textAlign:'right',fontWeight:900,color:'#E8890C'}}>{tot.wkH}h</td>
                    <td style={{textAlign:'right',fontWeight:900,color:'#E8890C'}}>{fmt$(tot.wkC)}</td>

              })()}
            </tbody>

        </div>
      </div>

      {/* H&W / Fringe — monthly actual + projected per dept */}
      <div className="stats-section">
        <div className="stats-section-title">Health &amp; Welfare / Fringe — Monthly by Department</div>
        <div className="stats-sub" style={{marginTop:-8,marginBottom:10,color:'#6B6F85',fontSize:11}}>
          Actual = hours already worked (from One &amp; Done imports when a person-day match exists, else scheduled hours for past days). Projected = scheduled hours for remaining days. Work-dept overrides from the schedule are respected; imported cost-center departments take priority when present.
        </div>
        <div style={{background:'#1C1E26',border:'1px solid #2A2D3A',borderRadius:10,overflow:'hidden'}}>
          <table className="perf-table">
            <thead>
              <tr>
                <th>Department</th>
                <th className="r">B Plan Hrs</th>
                <th className="r">V Plan Hrs</th>
                <th className="r">Total Hrs</th>
                <th className="r">Actual H&amp;W</th>
                <th className="r">Projected H&amp;W</th>
                <th className="r" style={{background:'#E8890C11',color:'#E8890C'}}>Month Total</th>
              </tr>
            </thead>
            <tbody>
              {(() => {
                const plans = budgetCfg?.hwPlans || { b:{hw:8.91,edu:0.07,legal:0.11,name:'B Plan'}, v:{hw:3.42,edu:0.07,legal:0.11,name:'V Plan'} };
                const defaultPlan = budgetCfg?.defaultPlan || 'b';
                const FALLBACK_PLAN = { hw:0, edu:0, legal:0, name:'—' };
                const rateOf = plan => { const p = plans[plan] || plans[defaultPlan] || FALLBACK_PLAN; return (p.hw||0)+(p.edu||0)+(p.legal||0); };
                const today = new Date();
                const isPast = (monthDay) => { const d = new Date(2026, 2, monthDay); return d <= today; };
                // Index actual records by monthDay → normalized name
                const recs = (actuals?._records) || [];
                const actByDayName = {}; // { monthDay: { normName: {hours, dept} } }
                const norm = s => (s||'').toLowerCase().replace(/[^a-z]/g,'');
                recs.forEach(r => {
                  if (!actByDayName[r.monthDay]) actByDayName[r.monthDay] = {};
                  const key = norm(r.name);
                  const existing = actByDayName[r.monthDay][key];
                  actByDayName[r.monthDay][key] = { hours: (existing?.hours||0)+r.hours, dept: r.dept };
                });

                const tally = {};
                DEPTS.forEach(d=>{ tally[d.id] = { bActualHrs:0, vActualHrs:0, bProjHrs:0, vProjHrs:0, actualAmt:0, projAmt:0 }; });
                (canonEmployees||[]).forEach(emp => {
                  const plan = emp.plan || defaultPlan;
                  const rate = rateOf(plan);
                  const empKey = norm(emp.name);
                  (window.WEEKS||[]).forEach(wk => {
                    const wkSh = (weekShifts||{})[wk.id] || {};
                    const shifts = wkSh[emp.id];
                    shifts && shifts.forEach((sh, di) => {
                      const monthDay = wk.dayIdx[di];
                      if (monthDay == null) return;
                      const schedHrs = sh[1] || 0;
                      const workDept = sh[5] || emp.dept;
                      if (!tally[workDept]) return;

                      // Does an actual record exist for this person + day?
                      const actRec = actByDayName[monthDay]?.[empKey];
                      const past = isPast(monthDay);

                      if (actRec && actRec.hours > 0) {
                        // Use actual hours. Dept comes from the actual record (cost-center mapped) if it resolves.
                        const actDept = (actRec.dept && tally[actRec.dept]) ? actRec.dept : workDept;
                        if (plan === 'b') tally[actDept].bActualHrs += actRec.hours;
                        else if (plan === 'v') tally[actDept].vActualHrs += actRec.hours;
                        tally[actDept].actualAmt += actRec.hours * rate;
                      } else if (schedHrs > 0) {
                        // Fallback: scheduled hrs → actual if past, projected if future
                        if (past) {
                          if (plan === 'b') tally[workDept].bActualHrs += schedHrs;
                          else if (plan === 'v') tally[workDept].vActualHrs += schedHrs;
                          tally[workDept].actualAmt += schedHrs * rate;
                        } else {
                          if (plan === 'b') tally[workDept].bProjHrs += schedHrs;
                          else if (plan === 'v') tally[workDept].vProjHrs += schedHrs;
                          tally[workDept].projAmt += schedHrs * rate;
                        }
                      }
                    });
                  });
                });
                const rows = DEPTS.map(d => ({ d, ...tally[d.id] }))
                  .filter(r => r.bActualHrs + r.vActualHrs + r.bProjHrs + r.vProjHrs > 0);
                if (!rows.length) return <tr><td colSpan={7} style={{textAlign:'center',color:'#4A4D60',padding:'20px 0',fontSize:11}}>No scheduled hours across March weeks yet.</td></tr>;
                const tot = rows.reduce((a,r)=>({
                  bActualHrs:a.bActualHrs+r.bActualHrs, vActualHrs:a.vActualHrs+r.vActualHrs,
                  bProjHrs:a.bProjHrs+r.bProjHrs, vProjHrs:a.vProjHrs+r.vProjHrs,
                  actualAmt:a.actualAmt+r.actualAmt, projAmt:a.projAmt+r.projAmt,
                }),{bActualHrs:0,vActualHrs:0,bProjHrs:0,vProjHrs:0,actualAmt:0,projAmt:0});
                return <>
                  {rows.map(({d,bActualHrs,vActualHrs,bProjHrs,vProjHrs,actualAmt,projAmt})=>{
                    const bH = bActualHrs+bProjHrs; const vH = vActualHrs+vProjHrs; const total = actualAmt+projAmt;
                    return <tr key={d.id}>
                      <td><span style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:9,height:9,borderRadius:'50%',background:d.color,display:'inline-block'}}/><span style={{color:d.color,fontWeight:700}}>{d.label}</span></span></td>
                      <td style={{textAlign:'right',color:bH>0?'#93C5FD':'#3A3D50'}}>{bH>0?bH+'h':'—'}</td>
                      <td style={{textAlign:'right',color:vH>0?'#FDA4A4':'#3A3D50'}}>{vH>0?vH+'h':'—'}</td>
                      <td style={{textAlign:'right',fontWeight:700,color:'#E8EAF0'}}>{(bH+vH)+'h'}</td>
                      <td style={{textAlign:'right',fontWeight:600,color:actualAmt>0?'#E8EAF0':'#4A4D60'}}>{actualAmt>0?fmt$(actualAmt):'—'}</td>
                      <td style={{textAlign:'right',fontWeight:600,color:projAmt>0?'#8B8FA8':'#4A4D60',fontStyle:projAmt>0?'italic':'normal'}}>{projAmt>0?fmt$(projAmt):'—'}</td>
                      <td style={{textAlign:'right',fontWeight:800,color:d.color}}>{fmt$(total)}</td>
                    </tr>;
                  })}
                  <tr className="tot-row" style={{background:'#13151C',borderTop:'2px solid #2A2D3A'}}>
                    <td style={{fontWeight:800}}>Month Total</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#93C5FD'}}>{(tot.bActualHrs+tot.bProjHrs)}h</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#FDA4A4'}}>{(tot.vActualHrs+tot.vProjHrs)}h</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#E8EAF0'}}>{(tot.bActualHrs+tot.vActualHrs+tot.bProjHrs+tot.vProjHrs)}h</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#E8EAF0'}}>{fmt$(tot.actualAmt)}</td>
                    <td style={{textAlign:'right',fontWeight:800,color:'#8B8FA8',fontStyle:'italic'}}>{fmt$(tot.projAmt)}</td>
                    <td style={{textAlign:'right',fontWeight:900,color:'#E8890C',fontSize:13}}>{fmt$(tot.actualAmt+tot.projAmt)}</td>
                  </tr>
                </>;
              })()}
            </tbody>
          </table>
        </div>
        <div style={{display:'flex',gap:14,marginTop:8,fontSize:10,color:'#6B6F85'}}>
          {Object.entries(budgetCfg?.hwPlans || {}).map(([k,p])=>{
            const r = ((p?.hw||0)+(p?.edu||0)+(p?.legal||0));
            const col = k==='b'?'#2563EB':k==='v'?'#D97757':'#6B6F85';
            return <span key={k}><span style={{width:8,height:8,background:col,borderRadius:2,display:'inline-block',marginRight:4,verticalAlign:'middle'}}/>{p?.name||k}: ${r.toFixed(2)}/hr</span>;
          })}
          <span style={{color:'#4A4D60'}}>— edit rates on the Budget tab</span>
        </div>
      </div>

      {/* Dept performance */}
      <div className="stats-section">
        <div className="stats-section-title">Department Performance</div>
        <div style={{background:'#1C1E26',border:'1px solid #2A2D3A',borderRadius:10,overflow:'hidden'}}>
          <table className="perf-table">
            <thead>
              <tr>
                <th>Department</th><th>Staff</th><th className="r">Sched Hrs</th>
                <th className="r">Wk Forecast</th><th className="r">Mth Forecast</th>
                <th className="r">MTD Actual</th><th className="r">Variance</th>
                <th style={{width:120}}>Budget Utilization</th>
              </tr>
            </thead>
            <tbody>
              {deptStats.map(({dept:d,ld,hrs,wkFcst,actAmt,varAmt,varPct,util,staff})=>(
                <tr key={d.id}>
                  <td><span style={{display:'inline-flex',alignItems:'center',gap:7}}><span style={{width:9,height:9,borderRadius:'50%',background:d.color,display:'inline-block'}}/><span style={{color:d.color,fontWeight:700}}>{d.label}</span></span></td>
                  <td style={{color:'#6B6F85'}}>{staff}</td>
                  <td style={{textAlign:'right',fontWeight:600}}>{hrs>0?hrs+'h':'—'}</td>
                  <td style={{textAlign:'right',color:'#8B8FA8'}}>{wkFcst>0?fmt$(wkFcst):'—'}</td>
                  <td style={{textAlign:'right',color:d.color,fontWeight:700}}>{fmt$(ld.forecast)}</td>
                  <td style={{textAlign:'right',fontWeight:700,color:actAmt>0?'#E8EAF0':'#4A4D60'}}>{actAmt>0?fmt$(actAmt):'—'}</td>
                  <td style={{textAlign:'right'}} className={varAmt===null?'':varAmt>0?'neg':'pos'}>{varAmt!==null?(varAmt>0?'+':'')+fmt$(varAmt):'—'}</td>
                  <td>
                    {util!==null?<>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                        <span style={{fontSize:9,color:'#6B6F85'}}>{util.toFixed(0)}%</span>
                        {util>100&&<span className="kpi-badge badge-red">Over</span>}
                        {util>80&&util<=100&&<span className="kpi-badge badge-amber">On Track</span>}
                        {util<=80&&<span className="kpi-badge badge-green">Under</span>}
                      </div>
                      <div className="util-bar"><div className="util-fill" style={{width:`${Math.min(100,util)}%`,background:util>100?'#DC2626':util>80?'#E8890C':d.color}}/></div>
                    </>:<span style={{fontSize:10,color:'#4A4D60'}}>No budget set</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>

      {/* Day dist + Insights */}
      <div className="stats-two-col">
        <div className="stats-section">
          <div className="stats-section-title">Scheduled Hours by Day</div>
          <div className="stats-card" style={{display:'flex',flexDirection:'column',gap:8}}>
            {DAYS.map((d,i)=>(
              <div key={d} className="day-dist">
                <span className="day-dist-label">{d}</span>
                <div className="day-dist-track">
                  <div className="day-dist-fill" style={{width:`${(hrsByDay[i]/maxDayHrs)*100}%`,background:i===maxDayIdx?'#E8890C':'#2563EB88'}}>
                    {hrsByDay[i]>0&&`${hrsByDay[i]}h`}
                  </div>
                </div>
                <span className="day-dist-val">{hrsByDay[i]>0?fmt$(hrsByDay[i]*(totalHrs>0?totalFcst/totalHrs:30)):'—'}</span>

        <div className="stats-section">
          <div className="stats-section-title">Insights &amp; Flags</div>
          <div className="stats-card">
            {insights.length>0 ? insights.map((ins,i)=>(
              <div key={i} className="insight-row">
                <span className="insight-icon">{ins.icon}</span>
                <span className="insight-text">{ins.text}</span>

            )):<div style={{color:'#4A4D60',fontSize:12,padding:'8px 0'}}>Import One &amp; Done data for deeper insights.</div>}
            {totalAct===0&&<div className="insight-row"><span className="insight-icon">💡</span><span className="insight-text">Go to <strong>Import</strong> tab to load actual labor data from One &amp; Done report.</span></div>}
          </div>

          <div className="stats-section-title" style={{marginTop:16}}>Event Type Analysis</div>
          <div className="stats-card">
            {Object.entries(eventGroups).map(([type,days])=>{
              const totHrs=days.reduce((s,d)=>s+d.hrs,0);

                <div key={type} className="insight-row">

                    <span style={{fontSize:10,color:'#6B6F85'}}>Days: {days.map(d=>d.day).join(', ')}</span>

        </div>
      </div>
    </div>
  );
}

// ─── Budget View ──────────────────────────────────────────────────────────────
function BudgetView({ config, sales, events, onConfigChange, onSalesChange, onEventsChange }) {
  const { MARCH_DAYS, DEFAULT_BUDGET_CONFIG } = window;
  // Guard against partial config from stale localStorage
  const safeCfg = {
    officeFlat: config?.officeFlat ?? DEFAULT_BUDGET_CONFIG.officeFlat,
    pcts: { ...DEFAULT_BUDGET_CONFIG.pcts, ...(config?.pcts || {}) },
    hwPlans: {
      ...DEFAULT_BUDGET_CONFIG.hwPlans,
      ...(config?.hwPlans || {}),
    },
    defaultPlan: config?.defaultPlan || DEFAULT_BUDGET_CONFIG.defaultPlan,
  };
  config = safeCfg;
  const daysInMonth = MARCH_DAYS.length;

  // Pool totals by area
  const salesByArea = useMemo(()=>{
    const prem = {food:0,nabev:0,alcohol:0,total:0};
    const rc = {food:0,nabev:0,alcohol:0,total:0};
    MARCH_DAYS.forEach((d,i)=>{
      const s = sales[i] || {};
      ['prem_food','prem_nabev','prem_alcohol','rc_food','rc_nabev','rc_alcohol'].forEach(k=>{
        const v = parseFloat(s[k])||0;
        if(k.startsWith('prem_')) { prem[k.replace('prem_','')] += v; prem.total += v; }
        else { rc[k.replace('rc_','')] += v; rc.total += v; }
      });
    });
    return { prem, rc, grand: prem.total + rc.total };
  },[sales]);

  // Labor $ per dept = pct × total area sales + (office flat for admin)
  const deptBudgets = useMemo(()=>{
    const out = {};
    DEPTS.forEach(d=>{
      const cfg = config.pcts[d.id] || { pct:0, area:'premium' };
      const pool = cfg.area === 'rc' ? salesByArea.rc.total : salesByArea.prem.total;
      const fromPct = pool * (cfg.pct/100);
      const fromFlat = d.id === 'admin' ? (config.officeFlat||0) : 0;
      out[d.id] = { fromPct, fromFlat, total: fromPct + fromFlat, pool, pct:cfg.pct, area:cfg.area };
    });
    return out;
  },[config,salesByArea]);

  const totalBudget = Object.values(deptBudgets).reduce((s,b)=>s+b.total,0);
  const totalPctPrem = DEPTS.filter(d=>config.pcts[d.id]?.area==='premium').reduce((s,d)=>s+(config.pcts[d.id]?.pct||0),0);
  const totalPctRc = DEPTS.filter(d=>config.pcts[d.id]?.area==='rc').reduce((s,d)=>s+(config.pcts[d.id]?.pct||0),0);

  // Daily budget: distribute each dept's budget based on that day's sales share of the area
  const dailyBudgets = useMemo(()=>{
    return MARCH_DAYS.map((d,i)=>{
      const s = sales[i] || {};
      const daySalesPrem = ['prem_food','prem_nabev','prem_alcohol'].reduce((a,k)=>a+(parseFloat(s[k])||0),0);
      const daySalesRc = ['rc_food','rc_nabev','rc_alcohol'].reduce((a,k)=>a+(parseFloat(s[k])||0),0);
      let dayBudget = 0; const byDept = {};
      DEPTS.forEach(dept=>{
        const cfg = config.pcts[dept.id] || { pct:0, area:'premium' };
        const pool = cfg.area === 'rc' ? salesByArea.rc.total : salesByArea.prem.total;
        const daySales = cfg.area === 'rc' ? daySalesRc : daySalesPrem;
        const share = pool > 0 ? daySales/pool : 0;
        const fromPct = share * (cfg.pct/100) * pool;
        const flatDay = dept.id==='admin' ? (config.officeFlat||0)/daysInMonth : 0;
        byDept[dept.id] = fromPct + flatDay;
        dayBudget += byDept[dept.id];
      });
      return { date:d.date, dow:d.dow, event:d.event, daySalesPrem, daySalesRc, total:daySalesPrem+daySalesRc, budget:dayBudget, byDept };
    });
  },[sales,config,salesByArea,daysInMonth]);

  const updateSale = (di, key, val)=>{ onSalesChange({ ...sales, [di]: { ...(sales[di]||{}), [key]: val } }); };
  const updatePct = (deptId, pct)=>{ onConfigChange({ ...config, pcts:{ ...config.pcts, [deptId]:{ ...(config.pcts[deptId]||{}), pct:parseFloat(pct)||0 } } }); };
  const updateArea = (deptId, area)=>{ onConfigChange({ ...config, pcts:{ ...config.pcts, [deptId]:{ ...(config.pcts[deptId]||{}), area } } }); };
  const updateFlat = (v)=>{ onConfigChange({ ...config, officeFlat:parseFloat(v)||0 }); };
  const resetDefaults = ()=>{ if(confirm('Reset % allocation to defaults?')) onConfigChange(JSON.parse(JSON.stringify(DEFAULT_BUDGET_CONFIG))); };

  const fillFromForecast = ()=>{
    if(!confirm('Fill sales from the default March forecast (sample distribution)? Current values will be overwritten.')) return;
    // Estimate sales from the file's daily forecast: if kp/rc f is the labor $, back out sales via % (prem 10%, rc 23%)
    const newSales = {};
    MARCH_DAYS.forEach((d,i)=>{
      const kpSales = (d.kp?.f||0) / 0.10;  // premium culinary labor 10% of sales
      const rcSales = (d.rc?.f||0) / 0.23;  // R&C labor ~23% of sales
      newSales[i] = {
        prem_food: Math.round(kpSales*0.70),
        prem_nabev: Math.round(kpSales*0.10),
        prem_alcohol: Math.round(kpSales*0.20),
        rc_food: Math.round(rcSales*0.65),
        rc_nabev: Math.round(rcSales*0.15),
        rc_alcohol: Math.round(rcSales*0.20),
      };
    });
    onSalesChange(newSales);
  };

  return (
    <div className="bg-view">
      {/* Summary */}
      <div className="bg-section">
        <div className="bg-title">Budget Summary — March 2026</div>
        <div className="bg-sub">Labor budget is calculated as: <strong style={{color:'#E8890C'}}>(% of sales × total area sales) + office flat</strong>. Edit sales and percentages below; totals recompute live.</div>
        <div className="bg-summary-grid">

                  <td className="num"><input className="sales-input" type="number" step=".01" min="0" value={p.edu} onChange={e=>updatePlan('edu',e.target.value)} style={{width:80,fontWeight:700,color:'#E8EAF0'}}/></td>
                  <td className="num"><input className="sales-input" type="number" step=".01" min="0" value={p.legal} onChange={e=>updatePlan('legal',e.target.value)} style={{width:80,fontWeight:700,color:'#E8EAF0'}}/></td>
                  <td className="num" style={{fontWeight:800,color:'#E8890C'}}>${combined.toFixed(2)}</td>
                  <td style={{textAlign:'center'}}>
                    <label style={{display:'inline-flex',alignItems:'center',gap:4,cursor:'pointer',fontSize:11,color:config.defaultPlan===k?'#4ADE80':'#6B6F85'}}>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>

          <button onClick={fillFromForecast} className="import-btn-sec" style={{padding:'4px 10px',fontSize:10}}>Fill from Forecast</button>
        </div>
        <div style={{overflowX:'auto'}}>
          <table className="sales-table">
            <thead>
              <tr>
                <th style={{width:70}}>Date</th>

                <th className="num" colSpan={3} style={{textAlign:'center',background:'#E8890C11',color:'#E8890C'}}>PREMIUM</th>

                <th className="num">Day Total</th>
              </tr>
              <tr>
                <th></th><th></th>
                <th className="num">Food</th><th className="num">NA Bev</th><th className="num">Alcohol</th>
                <th className="num">Food</th><th className="num">NA Bev</th><th className="num">Alcohol</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {MARCH_DAYS.map((d,i)=>{
                const s = sales[i] || {};
                const row = ['prem_food','prem_nabev','prem_alcohol','rc_food','rc_nabev','rc_alcohol'];
                const tot = row.reduce((a,k)=>a+(parseFloat(s[k])||0),0);
                return <tr key={i}>
                  <td style={{fontWeight:700,color:'#C8CAD6',whiteSpace:'nowrap'}}>{d.date} <span style={{fontSize:9,color:'#6B6F85',fontWeight:500}}>{d.dow}</span></td>
                  <td style={{color:'#8B8FA8',maxWidth:220,padding:'3px 6px'}}>
                    <input className="sales-input" type="text" value={events[i]!==undefined?events[i]:(d.event||'')} placeholder="Event name" onChange={e=>onEventsChange({...events,[i]:e.target.value})} style={{width:'100%',textAlign:'left'}}/>

// ─── App ──────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#E8890C","weekLabel":"Week of Mar 23–29, 2026"}/*EDITMODE-END*/;

function App() {
  const saved = JSON.parse(localStorage.getItem('km_v2')||'null');
  const safeBudgetCfg = (() => {
    const b = saved?.budgetCfg;
    const DEF = window.DEFAULT_BUDGET_CONFIG;
    if (!b || !b.pcts) return DEF;
    return {
      officeFlat: b.officeFlat ?? DEF.officeFlat,
      pcts: { ...DEF.pcts, ...b.pcts },
      hwPlans: { ...DEF.hwPlans, ...(b.hwPlans || {}) },
      defaultPlan: b.defaultPlan || DEF.defaultPlan,
    };
  })();

  // Migrate old single-week schema → multi-week. Seeds legacy shifts into wk4 (the original week).
  const initialEmployees = saved?.employees || INIT_EMPLOYEES;
  const initialWeekShifts = (() => {
    if (saved?.weekShifts) return saved.weekShifts;
    const seed = { wk1:{}, wk2:{}, wk3:{}, wk4:{}, wk5:{} };
    (saved?.employees || INIT_EMPLOYEES).forEach(e => {
      if (e.shifts && e.shifts.some(s=>s[0]||s[1]||s[2])) {
        seed.wk4[e.id] = JSON.parse(JSON.stringify(e.shifts));
      }
    });
    return seed;
  })();
  // Strip .shifts from canonical employees (now lives in weekShifts)
  const cleanEmployees = initialEmployees.map(({shifts, ...rest}) => rest);
  const [employees, setEmployees] = useState(cleanEmployees);
  const [activeWeek, setActiveWeek] = useState(saved?.activeWeek || 'wk4');
  const [weekShifts, setWeekShifts] = useState(initialWeekShifts);
  const [activeTab,  setActiveTab]  = useState('schedule');
  const [activeDept, setActiveDept] = useState('all');
  const [showLabor,  setShowLabor]  = useState(true);
  const [actuals,    setActuals]    = useState(saved?.actuals||{});
  const [budgetCfg,  setBudgetCfg]  = useState(safeBudgetCfg);
  const [sales,      setSales]      = useState(saved?.sales || {});
  const [events,     setEvents]     = useState(saved?.events || {});
  const [archives,   setArchives]   = useState(saved?.archives || []);
  const [showArchMenu,setShowArchMenu]=useState(false);
  const [tweaks, setTweaks]         = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);
  const [syncStatus, setSyncStatus] = useState('connecting');
  const [syncPaused, setSyncPaused] = useState(false);
  const applyingRemoteRef = useRef(false);

  useEffect(()=>{ localStorage.setItem('km_v2',JSON.stringify({employees,weekShifts,activeWeek,actuals,budgetCfg,sales,events,archives})); },[employees,weekShifts,activeWeek,actuals,budgetCfg,sales,events,archives]);

  // ─── Firebase live sync ────────────────────────────────────────────────────
  // Subscribe: listen for remote changes and merge in
  useEffect(()=>{
    if (!window.KMSync) return;
    const unsub = window.KMSync.subscribe(({ status, remoteSnapshot, applyingRemote }) => {
      setSyncStatus(status);
      if (applyingRemote && remoteSnapshot && !syncPaused) {
        applyingRemoteRef.current = true;
        // Merge remote → local. Only replace if remote timestamp is newer than last local change.
        if (remoteSnapshot.employees)  setEmployees(remoteSnapshot.employees);
        if (remoteSnapshot.weekShifts) setWeekShifts(remoteSnapshot.weekShifts);
        if (remoteSnapshot.actuals)    setActuals(remoteSnapshot.actuals);
        if (remoteSnapshot.budgetCfg)  setBudgetCfg(remoteSnapshot.budgetCfg);
        if (remoteSnapshot.sales)      setSales(remoteSnapshot.sales);
        if (remoteSnapshot.events)     setEvents(remoteSnapshot.events);
        if (remoteSnapshot.archives)   setArchives(remoteSnapshot.archives);
        // Clear flag after React flushes
        setTimeout(()=>{ applyingRemoteRef.current = false; }, 50);
      }
    });
    return unsub;
  }, [syncPaused]);

  // Push: when local state changes (and not from remote apply), push to Firebase
  useEffect(()=>{
    if (!window.KMSync) return;
    if (applyingRemoteRef.current) return;  // don't echo back what just came in
    if (syncPaused) return;
    window.KMSync.push({ employees, weekShifts, activeWeek, actuals, budgetCfg, sales, events, archives });
  }, [employees, weekShifts, actuals, budgetCfg, sales, events, archives, syncPaused]);

  // Apply user event overrides into live MARCH_DAYS so Declining Balance/Stats pick them up
  useEffect(()=>{
    window.MARCH_DAYS.forEach((d,i)=>{ if(events[i]!==undefined) d.event = events[i]; });
  },[events]);
  useEffect(()=>{
    window.addEventListener('message',e=>{
      if(e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if(e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  },[]);

  // Build merged employees-with-shifts for the active week; consumer components read this
  const activeEmployees = useMemo(() => {
    const w = weekShifts[activeWeek] || {};
    return employees.map(e => ({ ...e, shifts: w[e.id] || Array(7).fill(['',0,'']) }));
  }, [employees, weekShifts, activeWeek]);

  const handleCellEdit = useCallback((empId,dayIdx,shift)=>{
    setWeekShifts(prev => {
      const wk = prev[activeWeek] || {};
      const existing = wk[empId] || Array(7).fill(['',0,'']);
      const updated = existing.map((s,i)=>i===dayIdx?shift:s);
      return { ...prev, [activeWeek]: { ...wk, [empId]: updated } };
    });
  },[activeWeek]);

  // Week object currently viewed (dates, label, day index in month)
  const curWeek = useMemo(()=>window.WEEKS.find(w=>w.id===activeWeek)||window.WEEKS[3],[activeWeek]);
  // Compute active week dates + events (pure derivation, triggers rerender via context)
  const weekCtx = useMemo(()=>{
    const dates = curWeek.dates;
    const wevents = curWeek.dayIdx.map((monthDay,i)=>{
      const midx = monthDay!=null ? monthDay-1 : null;
      const dayObj = midx!=null ? window.MARCH_DAYS[midx] : null;
      const override = midx!=null ? events[midx] : undefined;
      return { day:i, event: override!==undefined ? override : (dayObj?.event||'') };
    });
    // Also mirror to window for any non-React readers (printSchedule), but don't rely on it for render
    window.WEEK_DATES = dates; window.WEEK_EVENTS = wevents;
    return { dates, events: wevents };
  },[curWeek,events]);

  const totalHrs = activeEmployees.reduce((s,e)=>s+e.shifts.reduce((ss,[,h])=>ss+(h||0),0),0);
  const totalFcst = LABOR_DATA.reduce((s,d)=>s+d.forecast,0);
  const totalAct = Object.values(actuals).reduce((s,d)=>s+(d.total||0),0);

  return (
    <WeekContext.Provider value={weekCtx}>
    <>
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div className="app-header">
        <div className="app-logo">SCHEDULING <span>MATRIX</span></div>
        <div className="main-tabs">
          {[['schedule','Schedule'],['budget','Budget'],['declining','Declining Balance'],['stats','Statistics'],['import','Import'],['people','People']].map(([id,lbl])=>(
            <button key={id} className={`main-tab${activeTab===id?' active':''}`} onClick={()=>setActiveTab(id)}>{lbl}
              {id==='import'&&totalAct>0&&<span style={{marginLeft:5,background:'#16A34A44',color:'#4ADE80',borderRadius:10,padding:'1px 5px',fontSize:9,fontWeight:800}}>✓</span>}
            </button>
          ))}
        </div>
        {activeTab==='schedule'&&<>
          <div className="week-nav">
            <button className="nav-btn" onClick={()=>{const i=window.WEEKS.findIndex(w=>w.id===activeWeek);if(i>0)setActiveWeek(window.WEEKS[i-1].id);}} disabled={activeWeek==='wk1'} style={{opacity:activeWeek==='wk1'?.35:1,cursor:activeWeek==='wk1'?'not-allowed':'pointer'}} title="Previous week">‹</button>
            <select value={activeWeek} onChange={e=>setActiveWeek(e.target.value)} style={{background:'#1C1E26',border:'1px solid #3A3D50',borderRadius:6,color:'#E8EAF0',fontSize:12,fontWeight:600,padding:'6px 10px',outline:'none',cursor:'pointer'}}>
              {window.WEEKS.map(w=><option key={w.id} value={w.id}>{w.label}</option>)}
            </select>
            <button className="nav-btn" onClick={()=>{const i=window.WEEKS.findIndex(w=>w.id===activeWeek);if(i<window.WEEKS.length-1)setActiveWeek(window.WEEKS[i+1].id);}} disabled={activeWeek==='wk5'} style={{opacity:activeWeek==='wk5'?.35:1,cursor:activeWeek==='wk5'?'not-allowed':'pointer'}} title="Next week">›</button>
          </div>
          <button className="print-btn" onClick={()=>printSchedule(activeDept,activeEmployees,curWeek.label)} title={activeDept==='all'?'Print all departments':'Print '+getDept(activeDept).label+' schedule'}>🖨 Print{activeDept!=='all'?' '+getDept(activeDept).label:''}</button>
          <button className={`labor-toggle${showLabor?' active':''}`} onClick={()=>setShowLabor(v=>!v)}>$ Labor</button>
        </>}
        <div style={{marginLeft:activeTab==='schedule'?0:'auto',position:'relative',display:'flex',alignItems:'center',gap:8}}>
          <div title={syncPaused?'Sync paused — working offline':
            syncStatus==='online'?'Live sync connected. Edits save automatically across all users.':
            syncStatus==='connecting'?'Connecting to sync…':
            syncStatus==='offline'?'Offline — changes will sync when connection returns':
            'Sync error — changes saved locally only'}
            style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 10px',background:'#1C1E26',border:'1px solid '+(syncPaused?'#6B6F85':syncStatus==='online'?'#16A34A66':syncStatus==='offline'?'#EAB30866':syncStatus==='error'?'#DC262666':'#3A3D50'),borderRadius:6,fontSize:10,fontWeight:700,letterSpacing:'.05em',color:syncPaused?'#8B8FA8':syncStatus==='online'?'#4ADE80':syncStatus==='offline'?'#FACC15':syncStatus==='error'?'#F87171':'#C8CAD6',cursor:'pointer'}}
            onClick={()=>setSyncPaused(p=>!p)}>
            <span style={{width:7,height:7,borderRadius:'50%',background:syncPaused?'#6B6F85':syncStatus==='online'?'#4ADE80':syncStatus==='offline'?'#FACC15':syncStatus==='error'?'#F87171':'#8B8FA8',animation:syncStatus==='online'&&!syncPaused?'pulse 2s infinite':'none'}}/>
            {syncPaused?'PAUSED':syncStatus==='online'?'LIVE':syncStatus==='connecting'?'…':syncStatus.toUpperCase()}
          </div>
          <button className="print-btn" onClick={()=>setShowArchMenu(v=>!v)} title="Archive / Month actions">📁 March 2026 ▾</button>
          {showArchMenu && <>
            <div style={{position:'fixed',inset:0,zIndex:400}} onClick={()=>setShowArchMenu(false)}/>
            <div className="archive-menu">
              <div className="archive-hdr">Current Month</div>
              <div className="archive-item" onClick={()=>{
                const blob={month:'March 2026',archived:new Date().toISOString(),employees,weekShifts,activeWeek,actuals,budgetCfg,sales,events};
                const a=document.createElement('a');a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(blob,null,2));
                a.download='scheduling-matrix-march-2026.json';a.click();setShowArchMenu(false);
              }}>📥 Backup / Export All Data (JSON)</div>
              <div className="archive-item" onClick={()=>{
                const inp=document.createElement('input');inp.type='file';inp.accept='.json';
                inp.onchange=async e=>{
                  const f=e.target.files?.[0];if(!f)return;
                  const txt=await f.text();let data;try{data=JSON.parse(txt);}catch{alert('Invalid JSON file.');return;}
                  if(!confirm('Restore from this backup? Current data across ALL users will be replaced. This cannot be undone.')) return;
                  if(data.employees)  setEmployees(data.employees.map(({shifts,...rest})=>rest));
                  if(data.weekShifts) setWeekShifts(data.weekShifts);
                  if(data.actuals)    setActuals(data.actuals);
                  if(data.budgetCfg)  setBudgetCfg(data.budgetCfg);
                  if(data.sales)      setSales(data.sales);
                  if(data.events)     setEvents(data.events);
                  alert('✓ Backup restored. Live-syncing to all users.');
                  setShowArchMenu(false);
                };
                inp.click();
              }}>📤 Restore from Backup (JSON)</div>
              <div className="archive-divider"/>
              <div className="archive-item" onClick={()=>{
                if(!confirm('Archive current month and start fresh? Schedule cells and actuals will clear; employees and % allocation will carry over as template.')) return;
                const snapshot={id:Date.now(),month:'March 2026',archived:new Date().toISOString(),employees:JSON.parse(JSON.stringify(employees)),weekShifts:JSON.parse(JSON.stringify(weekShifts)),activeWeek,actuals:JSON.parse(JSON.stringify(actuals)),budgetCfg:JSON.parse(JSON.stringify(budgetCfg)),sales:JSON.parse(JSON.stringify(sales)),events:JSON.parse(JSON.stringify(events))};
                setArchives([snapshot,...archives].slice(0,3));
                setWeekShifts({wk1:{},wk2:{},wk3:{},wk4:{},wk5:{}});
                setActuals({});setSales({});setEvents({});
                alert('✓ March 2026 archived. Schedule cleared. Employees, % allocation & office flat retained.');
                setShowArchMenu(false);
              }}>✨ Start New Month →</div>
              {archives.length>0 && <>
                <div className="archive-divider"/>
                <div className="archive-hdr">Archived ({archives.length})</div>
                {archives.map(a=>(
                  <div key={a.id} className="archive-item" onClick={()=>{
                    const blob={...a};
                    const d=document.createElement('a');d.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(blob,null,2));
                    d.download=`scheduling-matrix-${a.month.toLowerCase().replace(/ /g,'-')}.json`;d.click();setShowArchMenu(false);
                  }}>
                    <span style={{flex:1}}>{a.month}</span>
                    <span style={{fontSize:9,color:'#6B6F85'}}>{new Date(a.archived).toLocaleDateString()}</span>
                  </div>
                ))}
                <div className="archive-divider"/>
                <div className="archive-item danger" onClick={()=>{if(confirm('Clear all archives?')){setArchives([]);setShowArchMenu(false);}}}>🗑 Clear Archives</div>
              </>}
            </div>
          </>}
        </div>
      </div>

      {/* Summary bar */}
      {activeTab==='schedule'&&(
        <div className="week-summary">
          <div className="ws-item"><span className="ws-label">Staff</span><span className="ws-val">{activeEmployees.filter(e=>e.shifts.some(([s])=>s&&s!=='OFF')).length}</span></div>
          <div className="ws-divider"/>
          <div className="ws-item"><span className="ws-label">Total Hrs</span><span className="ws-val">{totalHrs}h</span></div>
          <div className="ws-divider"/>
          <div className="ws-item"><span className="ws-label">MTD Forecast</span><span className="ws-val" style={{color:'#E8890C'}}>{fmt$(totalFcst)}</span></div>
          {totalAct>0&&<><div className="ws-divider"/>
          <div className="ws-item"><span className="ws-label">MTD Actual</span><span className="ws-val" style={{color:'#4ADE80'}}>{fmt$(totalAct)}</span></div></>}
          <div className="ws-divider"/>
          {WEEK_EVENTS.map((ev,i)=>(
            <div key={i} className="ws-item">
              <span className="ws-label">{DAYS[i]}</span>
              <span className="ws-val" style={{fontSize:10,color:'#6B6F85'}}>{ev.event}</span>
            </div>
          ))}
        </div>
      )}

      <div className="app-body">
        {activeTab==='schedule'&&<>
          <div className="dept-sidebar">
            <div className="dept-section-label">Departments</div>
            <button className={`dept-all-btn${activeDept==='all'?' active':''}`} onClick={()=>setActiveDept('all')}>All Departments</button>
            {DEPTS.map(d=>(
              <button key={d.id} className={`dept-btn${activeDept===d.id?' active':''}`} onClick={()=>setActiveDept(d.id)}>
                <span className="dot" style={{background:d.color}}/>
                <span className="dept-name" style={{color:activeDept===d.id?d.color:'#8B8FA8'}}>{d.label}</span>
              </button>
            ))}
          </div>
          <div className="schedule-area">
            <ScheduleGrid employees={activeEmployees} activeDept={activeDept} onCellEdit={handleCellEdit}/>
          </div>
          {showLabor&&<LaborPanel employees={activeEmployees} laborData={LABOR_DATA} actuals={actuals}/>}
        </>}
        {activeTab==='declining'&&<DecBalView laborData={LABOR_DATA} actuals={actuals}/>}
        {activeTab==='budget'&&<BudgetView config={budgetCfg} sales={sales} events={events} onConfigChange={setBudgetCfg} onSalesChange={setSales} onEventsChange={setEvents}/>}
        {activeTab==='stats'&&<StatsView employees={activeEmployees} canonEmployees={employees} weekShifts={weekShifts} budgetCfg={budgetCfg} laborData={LABOR_DATA} actuals={actuals}/>}
        {activeTab==='import'&&<ImportView onApply={(grouped, records)=>{
          // Records already have monthDay from parser. Replace actuals for every day covered by this import.
          const recs = (records||[]).filter(r=>r.monthDay!=null);
          setActuals(prev => {
            const next = { ...prev, ...grouped };
            const touchedDays = new Set(recs.map(r=>r.monthDay));
            const existing = (prev._records||[]).filter(r => !touchedDays.has(r.monthDay));
            next._records = [...existing, ...recs];
            return next;
          });
        }} actuals={actuals} activeWeek={activeWeek}/>}
        {activeTab==='people'&&<PeopleView employees={activeEmployees} canonEmployees={employees} onUpdate={(next)=>{
          // next contains .shifts from activeEmployees merge — strip before saving to canonical
          setEmployees(next.map(({shifts, ...rest}) => rest));
        }} budgetCfg={budgetCfg}/>}
      </div>
    </div>

    {showTweaks&&(
      <div style={{position:'fixed',bottom:20,right:20,background:'#252838',border:'1px solid #3A3D50',borderRadius:12,padding:20,width:260,zIndex:9999,boxShadow:'0 8px 32px #00000070'}}>
        <div style={{fontWeight:800,fontSize:13,color:'#fff',marginBottom:14}}>Tweaks</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,fontWeight:700,color:'#6B6F85',marginBottom:6}}>ACCENT COLOR</div>
          <input type="color" value={tweaks.accentColor} style={{width:'100%',height:32,borderRadius:6,border:'none',cursor:'pointer'}}
            onChange={e=>{const v=e.target.value;setTweaks(t=>({...t,accentColor:v}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:v}},'*');}}/>
        </div>
        <div>
          <div style={{fontSize:10,fontWeight:700,color:'#6B6F85',marginBottom:6}}>WEEK LABEL</div>
          <input type="text" value={tweaks.weekLabel} style={{background:'#1C1E26',border:'1px solid #3A3D50',borderRadius:6,color:'#E8EAF0',fontSize:12,padding:'6px 10px',width:'100%',outline:'none'}}
            onChange={e=>{const v=e.target.value;setTweaks(t=>({...t,weekLabel:v}));window.parent.postMessage({type:'__edit_mode_set_keys',edits:{weekLabel:v}},'*');}}/>
        </div>
      </div>
    )}
    </>
    </WeekContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
